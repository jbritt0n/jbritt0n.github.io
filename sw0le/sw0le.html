<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>💪 sw0le · RPG Workout Randomizer (Expanded)</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;

    body {

      padding: 16px 8px 32px;
      color: #e2e8f0;
    }

      max-width: 700px;
      margin: 0 auto;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 8px;
    }
    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fbbf24, #f97316);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }
    .level-badge {
      background: #2d3b4f;
      padding: 8px 16px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: inset 0 2px 3px #0f172a, 0 4px 6px #0f172a;
      border: 1px solid #475569;
    }
    .level-badge span {
      font-weight: bold;
      color: #fcd34d;
    }
    .xp-bar-container {
      width: 120px;
      height: 12px;
      background: #0f172a;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: inset 0 1px 3px black;
    }
    .xp-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #fbbf24, #f97316);
      border-radius: 20px;
      box-shadow: 0 0 6px #fbbf24;
      transition: width 0.3s ease;
    }
    .equipment-panel {
      background: #1e293b;
      padding: 16px 12px;
      border-radius: 28px;
      margin-bottom: 20px;
      box-shadow: inset 0 1px 3px #0f172a, 0 8px 12px -4px #0f172a;
      border: 1px solid #334155;
    }
    .panel-title {
      font-weight: 600;
      margin-bottom: 12px;
      color: #94a3b8;
      letter-spacing: 0.3px;
    }
    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 18px;
    }
    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #0f172a;
      padding: 6px 14px;
      border-radius: 40px;
      border: 1px solid #475569;
      color: #cbd5e1;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.1s;
    }
    .checkbox-group label:has(input:checked) {
      background: #f97316;
      border-color: #fbbf24;
      color: #0f172a;
      font-weight: bold;
      box-shadow: 0 0 10px #f97316;
    }
    .checkbox-group input {
      accent-color: #f97316;
      width: 18px;
      height: 18px;
      margin: 0;
    }
    .btn-primary {
      background: linear-gradient(to bottom, #f97316, #ea580c);
      border: none;
      border-bottom: 4px solid #9a3412;
      color: white;
      font-weight: bold;
      font-size: 1.5rem;
      padding: 16px 24px;
      border-radius: 60px;
      width: 100%;
      cursor: pointer;
      box-shadow: 0 8px 0 #7c2d12, 0 4px 12px black;
      transition: all 0.07s;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 20px;
    }
    .btn-primary:active {
      transform: translateY(5px);
      box-shadow: 0 3px 0 #7c2d12, 0 4px 10px black;
    }
    .btn-secondary {
      background: #334155;
      border: none;
      border-bottom: 3px solid #1e293b;
      color: #f1f5f9;
      font-weight: 600;
      padding: 10px 16px;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.05s;
      box-shadow: 0 4px 0 #0f172a;
    }
    .btn-secondary:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #0f172a;
    }
    .action-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .circuit-card {
      background: #1e293b;
      border-radius: 24px;
      padding: 18px;
      margin-bottom: 16px;
      border-left: 8px solid;
      box-shadow: 0 6px 0 #0f172a, 0 8px 12px black;
      border: 1px solid #475569;
    }
    .circuit-A { border-left-color: #3b82f6; }
    .circuit-B { border-left-color: #a855f7; }
    .circuit-C { border-left-color: #ef4444; }
    .circuit-header {
      display: flex;
      justify-content: space-between;
      font-weight: 800;
      font-size: 1.3rem;
      margin-bottom: 12px;
      color: #f8fafc;
    }
    .exercise-list {
      list-style: none;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .exercise-item {
      background: #0f172a;
      padding: 12px 16px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #334155;
    }
    .exercise-name {
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .exercise-tags {
      display: flex;
      gap: 6px;
      font-size: 0.7rem;
      flex-wrap: wrap;
    }
    .tag {
      background: #2d3b4f;
      padding: 4px 8px;

      color: #a5b4cb;
      text-transform: uppercase;
    }
    .rep-count {
      background: #f97316;
      color: black;
      font-weight: bold;
      padding: 6px 12px;
      border-radius: 30px;
      font-size: 0.9rem;

      color: #94a3b8;

    }

      border-radius: 24px;
      padding: 16px;
      border: 1px solid #334155;
    }
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .history-log {
      max-height: 200px;
      overflow-y: auto;
      padding-right: 6px;
    }
    .history-entry {
      background: #0f172a;
      padding: 10px 14px;

      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      border-left: 4px solid #f97316;
      font-size: 0.9rem;
    }

    }

    }
  </style>
</head>

<div class="app-container">

    </div>

<script>
  (function(){
    "use strict";

    // ---------- RPG SYSTEM ----------
    let userLevel = 1;
    let currentXP = 0;
    const XP_PER_LEVEL = 100;

    function loadProgress() {
      try {
        const saved = localStorage.getItem('sw0le_progress');
        if (saved) {
          const data = JSON.parse(saved);
          userLevel = data.level || 1;
          currentXP = data.xp || 0;
        }
      } catch (e) {}
      updateLevelDisplay();
    }
    function saveProgress() {
      localStorage.setItem('sw0le_progress', JSON.stringify({ level: userLevel, xp: currentXP }));
    }
    function updateLevelDisplay() {
      document.getElementById('user-level').textContent = userLevel;
      const percent = Math.min((currentXP / XP_PER_LEVEL) * 100, 100);
      document.getElementById('xp-bar').style.width = percent + '%';
      document.getElementById('xp-text').textContent = `${currentXP}/${XP_PER_LEVEL}`;
    }
    function awardXP(amount) {
      currentXP += amount;
      while (currentXP >= XP_PER_LEVEL) {
        currentXP -= XP_PER_LEVEL;
        userLevel++;
        alert(`🎉 LEVEL UP! You are now level ${userLevel}!`);
      }
      saveProgress();
      updateLevelDisplay();
    }

    // ---------- EXPANDED EXERCISE DATABASE (70+ moves) ----------

      { id:'dumbbell-pullover', name:'Dumbbell Pullover (floor)', progressionLevel:2, muscleGroups:['lats','chest'], primaryMuscle:'lats', equipment:['dumbbells'], motion:{direction:'pull',plane:'horizontal'}, defaultReps:12 },
      
      // ===== ARMS =====
      { id:'bicep-curl', name:'Dumbbell Bicep Curl', progressionLevel:1, muscleGroups:['biceps'], primaryMuscle:'biceps', equipment:['dumbbells'], motion:{direction:'pull',plane:'vertical'}, defaultReps:10 },
      { id:'chair-dips', name:'Chair Dips', progressionLevel:2, muscleGroups:['triceps'], primaryMuscle:'triceps', equipment:['bodyweight'], motion:{direction:'push',plane:'vertical'}, defaultReps:12 },
      
      // ===== CORE & PLANK VARIATIONS =====
      { id:'plank', name:'Plank', progressionLevel:1, muscleGroups:['core'], primaryMuscle:'core', equipment:['bodyweight'], motion:{direction:'static',plane:'horizontal'}, defaultReps:45, isTimed:true },
      { id:'plank-feet-ball', name:'Plank with Feet on Exercise Ball', progressionLevel:3, muscleGroups:['core','shoulders'], primaryMuscle:'core', equipment:['exercise ball'], motion:{direction:'static',plane:'horizontal'}, defaultReps:40, isTimed:true },

      { id:'bent-knee-calf-raise', name:'Bent Knee Single Calf Raise', progressionLevel:2, muscleGroups:['soleus'], primaryMuscle:'calves', equipment:['bodyweight'], defaultReps:12, unilateral:true },
      
      // ===== CARDIO / FINISHERS =====
      { id:'jumping-jack', name:'Jumping Jacks', progressionLevel:1, muscleGroups:['cardio'], equipment:['bodyweight'], defaultReps:45, isCardio:true },

      { id:'mountain-climber', name:'Mountain Climbers', progressionLevel:1, muscleGroups:['cardio','core'], equipment:['bodyweight'], defaultReps:40, isCardio:true, isTimed:true },
      { id:'high-knees', name:'High Knees', progressionLevel:1, muscleGroups:['cardio'], equipment:['bodyweight'], defaultReps:40, isCardio:true },

      // ===== ADDITIONAL VARIATIONS (DEADBUGS, ETC) =====
      { id:'deadbug-reach', name:'Dead Bug with Reach', progressionLevel:2, muscleGroups:['core'], primaryMuscle:'core', equipment:['bodyweight'], defaultReps:10 },
      { id:'single-leg-deadbug', name:'Single Leg Dead Bug', progressionLevel:2, muscleGroups:['core'], primaryMuscle:'core', equipment:['bodyweight'], defaultReps:12 },
    ];

    // ---------- HELPER: FILTER BY EQUIPMENT & LEVEL ----------
    function getAvailableExercises(equipmentList) {
      return exerciseDB.filter(ex => {
        const eqOk = ex.equipment.every(req => equipmentList.includes(req));
        const levelOk = ex.progressionLevel <= userLevel;
        return eqOk && levelOk;
      });
    }

    // ---------- SMART RANDOMIZER (BALANCED CIRCUITS) ----------
    function generateWorkout(equipmentList) {
      const available = getAvailableExercises(equipmentList);
      if (available.length === 0) return { circuitA:[], circuitB:[], circuitC:[] };

      const strengthPool = available.filter(ex => !ex.isCardio);
      const cardioPool = available.filter(ex => ex.isCardio);
      const usedIds = new Set();
      
      function pickRandom(pool, filterFn = null) {
        let candidates = filterFn ? pool.filter(filterFn) : pool;
        candidates = candidates.filter(ex => !usedIds.has(ex.id));
        if (candidates.length === 0) {
          candidates = pool.filter(ex => !usedIds.has(ex.id));
          if (candidates.length === 0) return null;
        }
        const selected = candidates[Math.floor(Math.random() * candidates.length)];
        usedIds.add(selected.id);
        return selected;
      }

      // Circuit A (3-5 exercises)
      const circuitA = [];
      const aCount = 3 + Math.floor(Math.random() * 3);
      
      const lowerPush = pickRandom(strengthPool, ex => ex.motion?.direction === 'push' && ex.primaryMuscle?.match(/quads|glutes/));
      if (lowerPush) circuitA.push(lowerPush);
      const upperPush = pickRandom(strengthPool, ex => ex.motion?.direction === 'push' && ex.primaryMuscle?.match(/chest|shoulders|triceps/));
      if (upperPush) circuitA.push(upperPush);
      const upperPull = pickRandom(strengthPool, ex => ex.motion?.direction === 'pull' && ex.primaryMuscle?.match(/back|lats|biceps/));
      if (upperPull) circuitA.push(upperPull);
      
      while (circuitA.length < aCount) {
        const next = pickRandom(strengthPool);
        if (next) circuitA.push(next);
        else break;
      }

      // Circuit B (3-5) - different primary muscles
      const circuitB = [];
      const bCount = 3 + Math.floor(Math.random() * 3);
      const usedPrimary = new Set(circuitA.map(ex => ex.primaryMuscle).filter(Boolean));
      for (let i=0; i<bCount; i++) {
        const candidate = pickRandom(strengthPool, ex => !usedPrimary.has(ex.primaryMuscle));
        if (candidate) {
          circuitB.push(candidate);
          if (candidate.primaryMuscle) usedPrimary.add(candidate.primaryMuscle);
        } else {
          const fallback = pickRandom(strengthPool);
          if (fallback) circuitB.push(fallback);
        }
      }

      // Circuit C: Finisher (1-2 cardio moves)
      const circuitC = [];
      const cCount = 1 + Math.floor(Math.random() * 2);
      for (let i=0; i<cCount; i++) {
        const cardio = pickRandom(cardioPool);
        if (cardio) circuitC.push(cardio);
      }
      if (circuitC.length === 0) {
        const emergency = pickRandom(strengthPool, ex => ex.equipment.includes('bodyweight'));
        if (emergency) circuitC.push({...emergency, name: emergency.name + ' (fast)', isCardio:true });
      }

      return { circuitA, circuitB, circuitC };
    }

    // ---------- UI RENDERING ----------
    let currentWorkout = null;

    function renderWorkout(workout) {
      const container = document.getElementById('workout-container');
      if (!workout || (workout.circuitA.length===0 && workout.circuitB.length===0)) {
        container.innerHTML = '<div class="empty-message">⚠️ No exercises match your equipment/level. Try enabling more gear.</div>';
        return;
      }

      const renderCircuit = (circuit, title, circuitClass, sets=3) => {
        if (!circuit.length) return '';
        const items = circuit.map(ex => {
          const repDisplay = ex.isTimed ? `${ex.defaultReps}s` : `${ex.defaultReps} reps`;
          const tags = [];
          if (ex.motion) tags.push(`${ex.motion.direction} ${ex.motion.plane}`);
          else tags.push(ex.muscleGroups?.[0] || '');
          if (ex.isCardio) tags.push('💓cardio');
          if (ex.note) tags.push(ex.note);
          return `<li class="exercise-item">
            <div class="exercise-name">🏋️ ${ex.name} 
              <span class="exercise-tags">${tags.map(t => `<span class="tag">${t}</span>`).join('')}</span>
            </div>
            <div class="rep-count">${repDisplay}</div>
          </li>`;
        }).join('');
        
        return `<div class="circuit-card ${circuitClass}">
          <div class="circuit-header"><span>${title}</span><span>${sets} sets</span></div>
          <ul class="exercise-list">${items}</ul>
        </div>`;
      };

      const html = `
        ${renderCircuit(workout.circuitA, '⚡ CIRCUIT A', 'circuit-A', 3)}
        ${renderCircuit(workout.circuitB, '🔥 CIRCUIT B', 'circuit-B', 2)}
        ${renderCircuit(workout.circuitC, '💀 FINISHER', 'circuit-C', 1)}
      `;
      container.innerHTML = html || '<div class="empty-message">Roll again!</div>';
    }

    // ---------- HISTORY & TRACKING ----------
    let workoutHistory = [];
    function loadHistory() {
      try {
        const saved = localStorage.getItem('sw0le_history');
        if (saved) workoutHistory = JSON.parse(saved);
      } catch(e) {}
      renderHistory();
    }
    function saveHistory() {
      localStorage.setItem('sw0le_history', JSON.stringify(workoutHistory));
    }
    function addWorkoutToHistory(workout, xpEarned) {
      const entry = {
        date: new Date().toLocaleString(),
        exercises: [...workout.circuitA, ...workout.circuitB, ...workout.circuitC].map(e => e.name),
        xp: xpEarned,
        level: userLevel
      };
      workoutHistory.unshift(entry);
      if (workoutHistory.length > 20) workoutHistory.pop();
      saveHistory();
      renderHistory();
    }
    function renderHistory() {
      const logDiv = document.getElementById('history-log');
      if (workoutHistory.length === 0) {
        logDiv.innerHTML = '<div class="empty-message">No quests completed yet</div>';
        return;
      }
      logDiv.innerHTML = workoutHistory.map(entry => `
        <div class="history-entry">
          <div><strong>${entry.date}</strong><br>${entry.exercises.slice(0,3).join(', ')}${entry.exercises.length>3?'…':''}</div>
          <div class="xp-gain">+${entry.xp} XP (Lv.${entry.level})</div>
        </div>
      `).join('');
    }

    // ---------- EVENT LISTENERS ----------
    document.addEventListener('DOMContentLoaded', () => {
      loadProgress();
      loadHistory();

      const randomizeBtn = document.getElementById('randomize-btn');
      const completeBtn = document.getElementById('complete-workout-btn');
      const exportBtn = document.getElementById('export-btn');
      const resetBtn = document.getElementById('reset-progress-btn');
      const clearHistoryBtn = document.getElementById('clear-history-btn');
      const equipmentCheckboxes = document.querySelectorAll('#equipment-group input');

      function getSelectedEquipment() {
        return Array.from(equipmentCheckboxes).filter(cb => cb.checked).map(cb => cb.value);
      }

      randomizeBtn.addEventListener('click', () => {
        const equip = getSelectedEquipment();
        if (equip.length === 0) {
          alert('Select at least one equipment type!');
          return;
        }
        currentWorkout = generateWorkout(equip);
        renderWorkout(currentWorkout);
      });

      completeBtn.addEventListener('click', () => {
        if (!currentWorkout || (currentWorkout.circuitA.length===0 && currentWorkout.circuitB.length===0)) {
          alert('Generate a workout first!');
          return;
        }
        const totalEx = currentWorkout.circuitA.length + currentWorkout.circuitB.length + currentWorkout.circuitC.length;
        const xpEarned = (currentWorkout.circuitA.length * 8) + (currentWorkout.circuitB.length * 8) + (currentWorkout.circuitC.length * 5);
        awardXP(xpEarned);
        addWorkoutToHistory(currentWorkout, xpEarned);
        alert(`💪 Workout complete! +${xpEarned} XP`);
      });

      exportBtn.addEventListener('click', () => {
        if (workoutHistory.length === 0) {
          alert('No history to export.');
          return;
        }
        const text = workoutHistory.map(e => `${e.date} | Lv.${e.level} | +${e.xp} XP | ${e.exercises.join('; ')}`).join('\n');
        navigator.clipboard?.writeText(text).then(() => alert('📋 History copied to clipboard!'));
      });

      resetBtn.addEventListener('click', () => {
        if (confirm('Reset level and XP to 1?')) {
          userLevel = 1;
          currentXP = 0;
          saveProgress();
          updateLevelDisplay();
        }
      });

      clearHistoryBtn.addEventListener('click', () => {
        if (confirm('Clear all workout history?')) {
          workoutHistory = [];
          saveHistory();
          renderHistory();
        }
      });

      // Initial workout on load (bodyweight default)
      setTimeout(() => {
        currentWorkout = generateWorkout(['bodyweight']);
        renderWorkout(currentWorkout);
      }, 50);
    });
  })();
</script>
</body>
</html>
