<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>💀 SW0LE // ROGUE IRON</title>
  <!-- Chart.js for metrics -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      font-family: 'Courier New', Courier, 'Lucida Sans Typewriter', monospace;
    }

    body {
      background: #0a0f1a; /* dark navy base */
      min-height: 100vh;
      padding: 16px 8px 32px;
      color: #b0e0ff; /* light blue text */
      text-shadow: 0 0 4px #00aaff55;
      position: relative;
      overflow-x: hidden;
    }

    /* Matrix rain canvas overlay */
    #matrix-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.25;
      pointer-events: none;
    }

    .app-container {
      max-width: 800px;
      margin: 0 auto;
      position: relative;
      z-index: 5;
    }

    /* Pixelated / sci-fi header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
      border-bottom: 3px solid #00e6ff;
      padding-bottom: 12px;
      box-shadow: 0 4px 0 #003344;
    }

    h1 {
      font-size: 2.6rem;
      font-weight: 800;
      letter-spacing: 4px;
      color: #a0f0ff;
      text-shadow: 4px 4px 0 #003344, 6px 6px 0 #00000080;
      text-transform: uppercase;
      word-break: break-word;
    }

    .level-badge {
      background: #102030;
      padding: 8px 18px;
      border-radius: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: inset -2px -2px 0 #0a1a2a, inset 2px 2px 0 #1e4a6e, 4px 4px 0 #001020;
      border: 2px solid #00c8ff;
    }

    .level-badge span {
      font-weight: bold;
      color: #b0f0ff;
      text-transform: uppercase;
    }

    .xp-bar-container {
      width: 130px;
      height: 14px;
      background: #0a1a2a;
      border: 2px solid #00aaff;
      box-shadow: inset 2px 2px 0 #000810;
    }

    .xp-bar-fill {
      height: 100%;
      width: 0%;
      background: repeating-linear-gradient(90deg, #00ffaa, #00aaff);
      box-shadow: 0 0 10px #00ffcc;
      transition: width 0.2s step-end;
    }

    /* Equipment panel — cobalt blue */
    .equipment-panel {
      background: #0b1c2c;
      padding: 18px 14px;
      border-radius: 0;
      margin-bottom: 24px;
      box-shadow: inset 0 0 0 2px #004466, 6px 6px 0 #001020;
      border: 2px solid #00aaff;
    }

    .panel-title {
      font-weight: bold;
      margin-bottom: 14px;
      color: #80f0ff;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-left: 8px solid #00e6ff;
      padding-left: 12px;
    }

    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 18px;
    }

    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #103044;
      padding: 8px 16px;
      border-radius: 0;
      border: 2px solid #0088cc;
      color: #b0f0ff;
      font-weight: bold;
      text-transform: uppercase;
      font-size: 0.85rem;
      cursor: pointer;
      box-shadow: 3px 3px 0 #001020;
      transition: 0.05s linear;
    }

    .checkbox-group label:has(input:checked) {
      background: #00c8ff;
      border-color: #a0ffff;
      color: #001020;
      box-shadow: 0 0 12px #00e6ff, 3px 3px 0 #001020;
      text-shadow: none;
    }

    .checkbox-group input {
      accent-color: #00e6ff;
      width: 20px;
      height: 20px;
      margin: 0;
      filter: drop-shadow(0 0 2px #00ffff);
    }

    /* Buttons */
    .btn-primary {
      background: #0055aa;
      border: 3px solid #00e6ff;
      border-bottom: 6px solid #003366;
      color: #e0f0ff;
      font-weight: bold;
      font-size: 1.7rem;
      padding: 16px 20px;
      border-radius: 0;
      width: 100%;
      cursor: pointer;
      box-shadow: 6px 6px 0 #001020;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 24px;
      transition: 0.05s;
      text-shadow: 2px 2px 0 #002244;
    }

    .btn-primary:active {
      transform: translate(3px, 3px);
      box-shadow: 3px 3px 0 #001020;
      border-bottom-width: 3px;
    }

    .btn-secondary {
      background: #0e2a44;
      border: 2px solid #00aaff;
      border-bottom: 4px solid #003366;
      color: #c0f0ff;
      font-weight: bold;
      padding: 10px 18px;
      border-radius: 0;
      cursor: pointer;
      box-shadow: 4px 4px 0 #001020;
      text-transform: uppercase;
      font-size: 0.9rem;
      transition: 0.05s;
    }

    .btn-secondary:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 #001020;
    }

    .action-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    /* Circuit cards */
    .circuit-card {
      background: #0a1a2a;
      border-radius: 0;
      padding: 18px;
      margin-bottom: 20px;
      border-left: 12px solid;
      box-shadow: 6px 6px 0 #001020;
      border: 3px solid #004466;
      border-left-width: 12px;
    }

    .circuit-A { border-left-color: #00e6ff; }
    .circuit-B { border-left-color: #00ffaa; }
    .circuit-C { border-left-color: #00aaff; }

    .circuit-header {
      display: flex;
      justify-content: space-between;
      font-weight: 800;
      font-size: 1.5rem;
      margin-bottom: 18px;
      color: #b0f0ff;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .exercise-list {
      list-style: none;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .exercise-item {
      background: #102838;
      padding: 0;
      border-radius: 0;
      border: 2px solid #006699;
      box-shadow: inset 2px 2px 0 #001824, 3px 3px 0 #001020;
    }

    .exercise-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      cursor: pointer;
      user-select: none;
    }

    .exercise-name {
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      text-transform: uppercase;
    }

    .exercise-tags {
      display: flex;
      gap: 6px;
      font-size: 0.65rem;
      flex-wrap: wrap;
    }

    .tag {
      background: #004466;
      padding: 4px 8px;
      border: 1px solid #00aaff;
      color: #a0f0ff;
      text-transform: uppercase;
    }

    .rep-count {
      background: #00e6ff;
      color: #001020;
      font-weight: bold;
      padding: 6px 12px;
      border: 2px solid #0088cc;
      box-shadow: 2px 2px 0 #001020;
      font-size: 0.9rem;
    }

    .exercise-actions {
      display: flex;
      gap: 8px;
      margin-left: 10px;
    }

    .icon-btn {
      background: #0e3a5a;
      border: 2px solid #00c8ff;
      color: #c0f0ff;
      font-weight: bold;
      padding: 6px 10px;
      cursor: pointer;
      box-shadow: 2px 2px 0 #001020;
      text-transform: uppercase;
      font-size: 0.8rem;
      transition: 0.05s;
    }

    .icon-btn:active {
      transform: translate(1px, 1px);
      box-shadow: 1px 1px 0 #001020;
    }

    .exercise-details {
      padding: 0 16px 16px 16px;
      border-top: 2px dashed #0088cc;
      margin-top: 4px;
      color: #b0e0ff;
      background: #0a1a2a;
    }

    .exercise-instructions {
      margin: 10px 0;
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .video-placeholder {
      background: #0f2a3a;
      border: 2px solid #00e6ff;
      padding: 16px;
      text-align: center;
      color: #a0f0ff;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: inset 0 0 10px #00aaff33;
      margin-top: 8px;
    }

    /* Quests & Metrics tabs */
    .info-tabs {
      display: flex;
      gap: 10px;
      margin: 20px 0 10px;
    }

    .tab-btn {
      background: #0e2a44;
      border: 2px solid #00aaff;
      color: #b0f0ff;
      padding: 8px 18px;
      cursor: pointer;
      text-transform: uppercase;
      font-weight: bold;
      box-shadow: 3px 3px 0 #001020;
    }

    .tab-btn.active {
      background: #00aaff;
      color: #001020;
      border-color: #80f0ff;
    }

    .tab-panel {
      display: none;
      background: #0a1a2a;
      border: 3px solid #004466;
      padding: 18px;
      margin-bottom: 20px;
      box-shadow: 6px 6px 0 #001020;
    }

    .tab-panel.active {
      display: block;
    }

    .quest-list {
      list-style: none;
      padding: 0;
    }

    .quest-item {
      background: #102838;
      padding: 12px;
      margin-bottom: 10px;
      border-left: 8px solid #00e6ff;
      display: flex;
      justify-content: space-between;
      border: 2px solid #006699;
    }

    .quest-reward {
      color: #00ffaa;
      font-weight: bold;
    }

    .chart-container {
      width: 100%;
      height: 200px;
      margin-top: 10px;
    }

    .empty-message {
      text-align: center;
      color: #7aaacc;
      padding: 30px;
      font-style: italic;
      text-transform: uppercase;
    }

    .history-section {
      margin-top: 20px;
      background: #0a1a2a;
      border: 3px solid #004466;
      padding: 16px;
      box-shadow: 6px 6px 0 #001020;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      border-bottom: 2px solid #0088cc;
      padding-bottom: 8px;
    }

    .history-log {
      max-height: 220px;
      overflow-y: auto;
      padding-right: 6px;
    }

    .history-entry {
      background: #102838;
      padding: 12px 14px;
      border-left: 8px solid #00e6ff;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      border: 2px solid #006699;
      font-size: 0.9rem;
    }

    .xp-gain {
      color: #00ffaa;
      font-weight: bold;
    }

    .small-note {
      font-size: 0.8rem;
      color: #80b8d0;
      margin-top: 10px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <!-- Matrix Rain Canvas -->
  <canvas id="matrix-canvas"></canvas>

  <div class="app-container">
    <div class="header">
      <h1>SW0LE//ROGUE</h1>
      <div class="level-badge">
        <span>LVL <span id="user-level">1</span></span>
        <div class="xp-bar-container">
          <div class="xp-bar-fill" id="xp-bar" style="width:0%"></div>
        </div>
        <span id="xp-text">0/100</span>
      </div>
    </div>

    <!-- Equipment Selector -->
    <div class="equipment-panel">
      <div class="panel-title">[ EQUIPMENT_SLOTS ]</div>
      <div class="checkbox-group" id="equipment-group">
        <label><input type="checkbox" value="bodyweight" checked> 🦾 BODYWEIGHT</label>
        <label><input type="checkbox" value="dumbbells"> 🏋️ DUMBBELLS (25/5)</label>
        <label><input type="checkbox" value="pull-up bar"> 🔩 PULL‑UP BAR</label>
        <label><input type="checkbox" value="resistance bands"> 🎗️ BANDS</label>
        <label><input type="checkbox" value="exercise ball"> ⚡ EXERCISE BALL</label>
      </div>
      <div class="small-note">> LEVEL UP TO UNLOCK HARDCORE VARIATIONS</div>
    </div>

    <button class="btn-primary" id="randomize-btn">⚔️ ROLL ENCOUNTER ⚔️</button>

    <div class="action-bar">
      <button class="btn-secondary" id="complete-workout-btn">✅ COMPLETE (+XP)</button>
      <button class="btn-secondary" id="export-btn">📀 EXPORT LOG</button>
      <button class="btn-secondary" id="reset-progress-btn">⟲ RESET LEVEL</button>
    </div>

    <!-- Quests & Metrics Tabs -->
    <div class="info-tabs">
      <button class="tab-btn active" data-tab="quests">📜 QUESTS</button>
      <button class="tab-btn" data-tab="metrics">📈 METRICS</button>
    </div>
    <div id="quests-panel" class="tab-panel active">
      <h3 style="color:#b0f0ff; margin-bottom:12px;">ACTIVE OBJECTIVES</h3>
      <ul class="quest-list" id="quest-list"></ul>
    </div>
    <div id="metrics-panel" class="tab-panel">
      <h3 style="color:#b0f0ff; margin-bottom:12px;">PROGRESS CHART (XP / DAY)</h3>
      <div class="chart-container">
        <canvas id="progress-chart"></canvas>
      </div>
    </div>

    <!-- Workout display area -->
    <div id="workout-container">
      <div class="empty-message">[ PRESS ROLL TO GENERATE CIRCUIT ]</div>
    </div>

    <!-- History & Log -->
    <div class="history-section">
      <div class="history-header">
        <h3 style="color:#b0f0ff;">📼 QUEST_ARCHIVE</h3>
        <button class="btn-secondary" id="clear-history-btn" style="padding:6px 12px;">CLEAR</button>
      </div>
      <div class="history-log" id="history-log">
        <div class="empty-message">NO DATA</div>
      </div>
    </div>
  </div>

  <script>
    (function(){
      "use strict";

      // ---------- MATRIX RAIN EFFECT ----------
      const canvas = document.getElementById('matrix-canvas');
      const ctx = canvas.getContext('2d');
      let width, height;
      let columns, drops;
      const fontSize = 16;
      const chars = "01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン";
      function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        columns = Math.floor(width / fontSize);
        drops = Array(columns).fill(1);
      }
      function drawMatrix() {
        ctx.fillStyle = 'rgba(10, 20, 40, 0.05)';
        ctx.fillRect(0, 0, width, height);
        ctx.fillStyle = '#0ff';
        ctx.font = fontSize + 'px monospace';
        for (let i = 0; i < drops.length; i++) {
          const text = chars[Math.floor(Math.random() * chars.length)];
          ctx.fillText(text, i * fontSize, drops[i] * fontSize);
          if (drops[i] * fontSize > height && Math.random() > 0.975) drops[i] = 0;
          drops[i]++;
        }
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();
      setInterval(drawMatrix, 50);

      // ---------- RPG SYSTEM ----------
      let userLevel = 1;
      let currentXP = 0;
      const XP_PER_LEVEL = 100;
      let workoutHistory = [];
      let quests = [
        { id: 'first_workout', desc: 'Complete your first workout', target: 1, progress: 0, reward: 50, completed: false },
        { id: 'use_dumbbells', desc: 'Complete a workout using dumbbells', target: 1, progress: 0, reward: 30, completed: false },
        { id: 'reach_level3', desc: 'Reach Level 3', target: 3, progress: 1, reward: 80, completed: false },
        { id: 'finisher', desc: 'Complete a workout with a finisher circuit', target: 1, progress: 0, reward: 40, completed: false },
        { id: 'workout_streak', desc: 'Complete 3 workouts total', target: 3, progress: 0, reward: 60, completed: false }
      ];

      function loadProgress() {
        try {
          const saved = localStorage.getItem('sw0le_progress');
          if (saved) {
            const data = JSON.parse(saved);
            userLevel = data.level || 1;
            currentXP = data.xp || 0;
          }
          const savedQuests = localStorage.getItem('sw0le_quests');
          if (savedQuests) quests = JSON.parse(savedQuests);
          const savedHistory = localStorage.getItem('sw0le_history');
          if (savedHistory) workoutHistory = JSON.parse(savedHistory);
        } catch (e) {}
        updateLevelDisplay();
        updateQuestProgressFromHistory();
        renderQuests();
        renderHistory();
        updateChart();
      }

      function saveProgress() {
        localStorage.setItem('sw0le_progress', JSON.stringify({ level: userLevel, xp: currentXP }));
        localStorage.setItem('sw0le_quests', JSON.stringify(quests));
        localStorage.setItem('sw0le_history', JSON.stringify(workoutHistory));
      }

      function updateLevelDisplay() {
        document.getElementById('user-level').textContent = userLevel;
        const percent = Math.min((currentXP / XP_PER_LEVEL) * 100, 100);
        document.getElementById('xp-bar').style.width = percent + '%';
        document.getElementById('xp-text').textContent = `${currentXP}/${XP_PER_LEVEL}`;
        // Quest: reach level 3
        const levelQuest = quests.find(q => q.id === 'reach_level3');
        if (levelQuest && !levelQuest.completed) {
          levelQuest.progress = userLevel;
          if (userLevel >= 3) completeQuest(levelQuest);
        }
        renderQuests();
        saveProgress();
      }

      function awardXP(amount) {
        currentXP += amount;
        while (currentXP >= XP_PER_LEVEL) {
          currentXP -= XP_PER_LEVEL;
          userLevel++;
          alert(`💀 LEVEL UP! You are now level ${userLevel}! New moves unlocked.`);
        }
        updateLevelDisplay();
      }

      function completeQuest(quest) {
        if (quest.completed) return;
        quest.completed = true;
        awardXP(quest.reward);
        alert(`✨ QUEST COMPLETE: ${quest.desc} (+${quest.reward} XP)`);
        renderQuests();
        saveProgress();
      }

      function updateQuestProgressFromHistory() {
        const totalWorkouts = workoutHistory.length;
        const usedDumbbells = workoutHistory.some(w => w.exercises.some(e => e.includes('Dumbbell') || e.includes('DB')));
        const hasFinisher = workoutHistory.some(w => w.exercises.some(e => e.includes('Finisher') || e.includes('Cardio')));
        
        quests.forEach(q => {
          if (q.completed) return;
          if (q.id === 'first_workout' || q.id === 'workout_streak') {
            q.progress = Math.min(totalWorkouts, q.target);
            if (q.progress >= q.target) completeQuest(q);
          } else if (q.id === 'use_dumbbells') {
            q.progress = usedDumbbells ? 1 : 0;
            if (q.progress >= q.target) completeQuest(q);
          } else if (q.id === 'finisher') {
            q.progress = hasFinisher ? 1 : 0;
            if (q.progress >= q.target) completeQuest(q);
          }
        });
        renderQuests();
      }

      function renderQuests() {
        const container = document.getElementById('quest-list');
        container.innerHTML = quests.map(q => `
          <li class="quest-item">
            <span>${q.completed ? '✅' : '⬜'} ${q.desc} (${q.progress}/${q.target})</span>
            <span class="quest-reward">+${q.reward} XP</span>
          </li>
        `).join('');
      }

      // ---------- CHART METRICS ----------
      let chartInstance = null;
      function updateChart() {
        const ctx = document.getElementById('progress-chart').getContext('2d');
        // Aggregate XP per day (last 7 days)
        const last7Days = [];
        const today = new Date();
        for (let i = 6; i >= 0; i--) {
          const d = new Date(today);
          d.setDate(today.getDate() - i);
          last7Days.push(d.toLocaleDateString());
        }
        const xpByDay = {};
        last7Days.forEach(day => xpByDay[day] = 0);
        workoutHistory.forEach(entry => {
          const date = new Date(entry.date).toLocaleDateString();
          if (xpByDay.hasOwnProperty(date)) xpByDay[date] += entry.xp;
        });
        const data = last7Days.map(day => xpByDay[day]);
        
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: last7Days.map(d => d.slice(5)),
            datasets: [{
              label: 'XP Gained',
              data: data,
              backgroundColor: '#00e6ff',
              borderColor: '#00aaff',
              borderWidth: 2
            }]
          },
          options: {
            scales: { y: { beginAtZero: true, grid: { color: '#1e4a6e' } } },
            plugins: { legend: { labels: { color: '#b0f0ff' } } }
          }
        });
      }

      // ---------- EXERCISE DATABASE (70+ moves) ----------
      const exerciseDB = [
        // (Full database from previous answer, plus more)
        { id:'squat', name:'Bodyweight Squat', baseName:'Squat', progressionLevel:1, muscleGroups:['quads','glutes'], primaryMuscle:'quads', equipment:['bodyweight'], motion:{direction:'push',plane:'vertical'}, defaultReps:15, instructions:'Stand with feet shoulder-width, lower hips back and down, keep chest up. Drive through heels.' },
        { id:'goblet-squat', name:'Goblet Squat (DB)', baseName:'Squat', progressionLevel:2, muscleGroups:['quads','glutes'], primaryMuscle:'quads', equipment:['dumbbells'], motion:{direction:'push',plane:'vertical'}, defaultReps:14, instructions:'Hold one dumbbell vertically against chest, squat deep, elbows inside knees.' },
        { id:'sumo-squat-db', name:'Sumo Squat (DB)', baseName:'Squat', progressionLevel:2, muscleGroups:['glutes','inner thighs'], primaryMuscle:'glutes', equipment:['dumbbells'], motion:{direction:'push',plane:'vertical'}, defaultReps:10, instructions:'Wide stance, toes out, hold dumbbell between legs, squat down.' },
        { id:'bulgarian-split', name:'Bulgarian Split Squat', baseName:'Split Squat', progressionLevel:2, muscleGroups:['quads','glutes'], primaryMuscle:'quads', equipment:['bodyweight','dumbbells'], motion:{direction:'push',plane:'vertical'}, defaultReps:10, instructions:'Back foot elevated on chair, front foot forward, lower until front thigh parallel.' },
        { id:'single-leg-squat-wall', name:'Single Leg Squat (wall)', baseName:'Pistol Squat', progressionLevel:3, muscleGroups:['quads','glutes'], primaryMuscle:'quads', equipment:['bodyweight'], defaultReps:10, instructions:'Stand near wall for balance, lower on one leg as far as possible.' },
        { id:'glute-bridge', name:'Glute Bridge', baseName:'Glute Bridge', progressionLevel:1, muscleGroups:['glutes','hamstrings'], primaryMuscle:'glutes', equipment:['bodyweight'], motion:{direction:'push',plane:'horizontal'}, defaultReps:15, instructions:'Lie on back, knees bent, squeeze glutes to lift hips.' },
        { id:'single-leg-bridge', name:'Single-Leg Glute Bridge', baseName:'Glute Bridge', progressionLevel:2, muscleGroups:['glutes','hamstrings'], primaryMuscle:'glutes', equipment:['bodyweight'], defaultReps:10, instructions:'Same as glute bridge but with one leg extended.' },
        { id:'marching-bridge', name:'Marching Glute Bridge', baseName:'Glute Bridge', progressionLevel:2, muscleGroups:['glutes','core'], primaryMuscle:'glutes', equipment:['bodyweight'], defaultReps:12, instructions:'Hold bridge, alternate lifting knees toward chest.' },
        { id:'pushup', name:'Push‑up', baseName:'Pushup', progressionLevel:1, muscleGroups:['chest','triceps'], primaryMuscle:'chest', equipment:['bodyweight'], motion:{direction:'push',plane:'horizontal'}, defaultReps:12, instructions:'Hands shoulder-width, body straight, lower chest to floor.' },
        { id:'wide-pushup', name:'Wide Grip Push‑up', baseName:'Pushup', progressionLevel:2, muscleGroups:['chest'], primaryMuscle:'chest', equipment:['bodyweight'], defaultReps:15, instructions:'Hands wider than shoulders.' },
        { id:'diamond-pushup', name:'Diamond Push‑up', baseName:'Pushup', progressionLevel:2, muscleGroups:['triceps'], primaryMuscle:'triceps', equipment:['bodyweight'], defaultReps:10, instructions:'Hands together under chest, form diamond shape.' },
        { id:'decline-pushup', name:'Decline Push‑up', baseName:'Pushup', progressionLevel:2, muscleGroups:['upper chest'], primaryMuscle:'chest', equipment:['bodyweight'], defaultReps:12, instructions:'Feet elevated on stairs/chair.' },
        { id:'plyo-pushup', name:'Plyometric Push‑up', baseName:'Pushup', progressionLevel:3, muscleGroups:['chest','triceps'], primaryMuscle:'chest', equipment:['bodyweight'], defaultReps:10, instructions:'Push explosively so hands leave ground.' },
        { id:'pike-pushup', name:'Pike Push‑up', baseName:'Pike Pushup', progressionLevel:2, muscleGroups:['shoulders','triceps'], primaryMuscle:'shoulders', equipment:['bodyweight'], motion:{direction:'push',plane:'vertical'}, defaultReps:12, instructions:'Hips high, head down, lower top of head toward floor.' },
        { id:'bent-row-db', name:'Bent Over Row (DB)', baseName:'Row', progressionLevel:2, muscleGroups:['lats','rhomboids'], primaryMuscle:'lats', equipment:['dumbbells'], motion:{direction:'pull',plane:'horizontal'}, defaultReps:10, instructions:'Hinge at hips, pull dumbbell to hip, squeeze back.' },
        { id:'gorilla-row', name:'Gorilla Row', baseName:'Row', progressionLevel:2, muscleGroups:['lats','traps'], primaryMuscle:'lats', equipment:['dumbbells'], defaultReps:8, instructions:'Wide stance, alternate rowing each dumbbell with slight twist.' },
        { id:'arnold-press', name:'Arnold Press', baseName:'Press', progressionLevel:2, muscleGroups:['shoulders'], primaryMuscle:'shoulders', equipment:['dumbbells'], motion:{direction:'push',plane:'vertical'}, defaultReps:10, instructions:'Start palms facing you, rotate outward as you press up.' },
        { id:'plank', name:'Plank', baseName:'Plank', progressionLevel:1, muscleGroups:['core'], primaryMuscle:'core', equipment:['bodyweight'], defaultReps:45, isTimed:true, instructions:'Forearms on ground, body straight, hold.' },
        { id:'plank-feet-ball', name:'Plank Feet on Ball', baseName:'Plank', progressionLevel:3, muscleGroups:['core'], primaryMuscle:'core', equipment:['exercise ball'], defaultReps:40, isTimed:true, instructions:'Feet on ball, hands on floor, maintain stability.' },
        { id:'deadbug', name:'Dead Bug', baseName:'Deadbug', progressionLevel:1, muscleGroups:['core'], primaryMuscle:'core', equipment:['bodyweight'], defaultReps:12, instructions:'On back, arms up, legs tabletop, lower opposite arm/leg.' },
        { id:'deadbug-reach', name:'Dead Bug with Reach', baseName:'Deadbug', progressionLevel:2, muscleGroups:['core'], primaryMuscle:'core', equipment:['bodyweight'], defaultReps:10, instructions:'Extend limbs further for challenge.' },
        { id:'jumping-jack', name:'Jumping Jacks', progressionLevel:1, muscleGroups:['cardio'], equipment:['bodyweight'], defaultReps:45, isCardio:true, instructions:'Jump feet out while raising arms.' },
        { id:'mountain-climber', name:'Mountain Climbers', progressionLevel:1, muscleGroups:['cardio','core'], equipment:['bodyweight'], defaultReps:40, isCardio:true, isTimed:true, instructions:'In pushup position, drive knees to chest alternately.' },
        { id:'squat-jump', name:'Squat Jumps', progressionLevel:2, muscleGroups:['quads','glutes'], equipment:['bodyweight'], defaultReps:12, explosive:true, isCardio:true, instructions:'Squat down, explode upward.' },
        // ... (include all previous exercises from earlier answer for completeness)
      ];

      // Helper: find harder variation
      function findHarderVariation(exercise) {
        const sameBase = exerciseDB.filter(e => e.baseName === exercise.baseName && e.progressionLevel > exercise.progressionLevel);
        if (sameBase.length) return sameBase.sort((a,b) => a.progressionLevel - b.progressionLevel)[0];
        const harder = exerciseDB.find(e => e.primaryMuscle === exercise.primaryMuscle && e.progressionLevel > exercise.progressionLevel);
        return harder || null;
      }

      function getAvailableExercises(equipmentList) {
        return exerciseDB.filter(ex => {
          const eqOk = ex.equipment.every(req => equipmentList.includes(req));
          const levelOk = ex.progressionLevel <= userLevel;
          return eqOk && levelOk;
        });
      }

      function generateWorkout(equipmentList) {
        const available = getAvailableExercises(equipmentList);
        if (available.length === 0) return { circuitA:[], circuitB:[], circuitC:[] };
        const strengthPool = available.filter(ex => !ex.isCardio);
        const cardioPool = available.filter(ex => ex.isCardio);
        const usedIds = new Set();
        
        function pickRandom(pool, filterFn = null) {
          let candidates = filterFn ? pool.filter(filterFn) : pool;
          candidates = candidates.filter(ex => !usedIds.has(ex.id));
          if (candidates.length === 0) {
            candidates = pool.filter(ex => !usedIds.has(ex.id));
            if (candidates.length === 0) return null;
          }
          const selected = candidates[Math.floor(Math.random() * candidates.length)];
          usedIds.add(selected.id);
          return selected;
        }

        const circuitA = []; const aCount = 3 + Math.floor(Math.random()*3);
        const lowerPush = pickRandom(strengthPool, ex => ex.motion?.direction==='push' && ex.primaryMuscle?.match(/quads|glutes/));
        if(lowerPush) circuitA.push(lowerPush);
        const upperPush = pickRandom(strengthPool, ex => ex.motion?.direction==='push' && ex.primaryMuscle?.match(/chest|shoulders|triceps/));
        if(upperPush) circuitA.push(upperPush);
        const upperPull = pickRandom(strengthPool, ex => ex.motion?.direction==='pull' && ex.primaryMuscle?.match(/back|lats|biceps/));
        if(upperPull) circuitA.push(upperPull);
        while(circuitA.length < aCount) { const n = pickRandom(strengthPool); if(n) circuitA.push(n); else break; }

        const circuitB = []; const bCount = 3 + Math.floor(Math.random()*3);
        const usedPrimary = new Set(circuitA.map(ex=>ex.primaryMuscle).filter(Boolean));
        for(let i=0; i<bCount; i++) {
          const cand = pickRandom(strengthPool, ex => !usedPrimary.has(ex.primaryMuscle));
          if(cand) { circuitB.push(cand); usedPrimary.add(cand.primaryMuscle); }
          else { const fb = pickRandom(strengthPool); if(fb) circuitB.push(fb); }
        }

        const circuitC = []; const cCount = 1+Math.floor(Math.random()*2);
        for(let i=0; i<cCount; i++) { const c = pickRandom(cardioPool); if(c) circuitC.push(c); }
        if(circuitC.length===0) { const em = pickRandom(strengthPool, ex=>ex.equipment.includes('bodyweight')); if(em) circuitC.push({...em, name:em.name+' (FAST)', isCardio:true}); }
        return { circuitA, circuitB, circuitC };
      }

      // UI rendering
      let currentWorkout = null;
      function renderWorkout(workout) {
        const container = document.getElementById('workout-container');
        if (!workout || (workout.circuitA.length===0 && workout.circuitB.length===0)) {
          container.innerHTML = '<div class="empty-message">⚠️ NO MOVES FOR CURRENT GEAR/LEVEL</div>';
          return;
        }

        const renderCircuit = (circuit, title, circuitClass, sets=3) => {
          if (!circuit.length) return '';
          const items = circuit.map((ex, idx) => {
            const repDisplay = ex.isTimed ? `${ex.defaultReps}s` : `${ex.defaultReps} reps`;
            const tags = [];
            if (ex.motion) tags.push(`${ex.motion.direction} ${ex.motion.plane}`);
            if (ex.isCardio) tags.push('💓CARDIO');
            const instructions = ex.instructions || 'Perform with controlled form.';
            return `
              <li class="exercise-item" data-circuit="${circuitClass}" data-index="${idx}">
                <div class="exercise-summary">
                  <div class="exercise-name">
                    🏋️ ${ex.name}
                    <span class="exercise-tags">${tags.map(t => `<span class="tag">${t}</span>`).join('')}</span>
                  </div>
                  <div style="display:flex; align-items:center; gap:10px;">
                    <div class="rep-count">${repDisplay}</div>
                    <div class="exercise-actions">
                      <button class="icon-btn harder-btn" data-exercise-id="${ex.id}" data-circuit="${circuitClass}" data-index="${idx}">⬆️+</button>
                      <button class="icon-btn toggle-details">📖</button>
                    </div>
                  </div>
                </div>
                <div class="exercise-details" style="display:none;">
                  <div class="exercise-instructions">📋 ${instructions}</div>
                  <div class="video-placeholder">🎥 [ VIDEO TUTORIAL: ${ex.name} ]<br><span style="font-size:0.7rem;">(YouTube placeholder)</span></div>
                </div>
              </li>
            `;
          }).join('');
          return `<div class="circuit-card ${circuitClass}">
            <div class="circuit-header"><span>${title}</span><span>${sets} SETS</span></div>
            <ul class="exercise-list">${items}</ul>
          </div>`;
        };

        container.innerHTML = `
          ${renderCircuit(workout.circuitA, 'CIRCUIT_A', 'circuit-A', 3)}
          ${renderCircuit(workout.circuitB, 'CIRCUIT_B', 'circuit-B', 2)}
          ${renderCircuit(workout.circuitC, 'FINISHER', 'circuit-C', 1)}
        `;

        document.querySelectorAll('.toggle-details').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const item = btn.closest('.exercise-item');
            const details = item.querySelector('.exercise-details');
            details.style.display = details.style.display === 'none' ? 'block' : 'none';
          });
        });
        
        document.querySelectorAll('.harder-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const circuitClass = btn.dataset.circuit;
            const index = parseInt(btn.dataset.index);
            const currentEx = workout[circuitClass === 'circuit-A' ? 'circuitA' : (circuitClass === 'circuit-B' ? 'circuitB' : 'circuitC')][index];
            const harder = findHarderVariation(currentEx);
            if (harder) {
              if (circuitClass === 'circuit-A') workout.circuitA[index] = harder;
              else if (circuitClass === 'circuit-B') workout.circuitB[index] = harder;
              else workout.circuitC[index] = harder;
              renderWorkout(workout);
            } else {
              alert(`⚡ No harder variation available for ${currentEx.name} yet. Level up more!`);
            }
          });
        });
      }

      function renderHistory() {
        const logDiv = document.getElementById('history-log');
        if (workoutHistory.length === 0) {
          logDiv.innerHTML = '<div class="empty-message">NO DATA</div>';
          return;
        }
        logDiv.innerHTML = workoutHistory.slice(0,20).map(entry => `
          <div class="history-entry">
            <div><strong>${entry.date}</strong><br>${entry.exercises.slice(0,3).join(', ')}${entry.exercises.length>3?'…':''}</div>
            <div class="xp-gain">+${entry.xp} XP</div>
          </div>
        `).join('');
      }

      function addWorkoutToHistory(workout, xpEarned) {
        const entry = {
          date: new Date().toLocaleString(),
          exercises: [...workout.circuitA, ...workout.circuitB, ...workout.circuitC].map(e => e.name),
          xp: xpEarned,
          level: userLevel
        };
        workoutHistory.unshift(entry);
        if (workoutHistory.length > 50) workoutHistory.pop();
        saveProgress();
        renderHistory();
        updateChart();
        updateQuestProgressFromHistory();
      }

      // Event listeners
      document.addEventListener('DOMContentLoaded', () => {
        loadProgress();
        const randomizeBtn = document.getElementById('randomize-btn');
        const completeBtn = document.getElementById('complete-workout-btn');
        const exportBtn = document.getElementById('export-btn');
        const resetBtn = document.getElementById('reset-progress-btn');
        const clearHistoryBtn = document.getElementById('clear-history-btn');
        const equipmentCheckboxes = document.querySelectorAll('#equipment-group input');
        const getSelectedEquipment = () => Array.from(equipmentCheckboxes).filter(cb=>cb.checked).map(cb=>cb.value);

        // Tabs
        document.querySelectorAll('.tab-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(btn.dataset.tab + '-panel').classList.add('active');
            if (btn.dataset.tab === 'metrics') updateChart();
          });
        });

        randomizeBtn.addEventListener('click', () => {
          const equip = getSelectedEquipment();
          if (equip.length === 0) { alert('Select equipment!'); return; }
          currentWorkout = generateWorkout(equip);
          renderWorkout(currentWorkout);
        });

        completeBtn.addEventListener('click', () => {
          if (!currentWorkout) { alert('Generate a workout first.'); return; }
          const xp = (currentWorkout.circuitA.length*8)+(currentWorkout.circuitB.length*8)+(currentWorkout.circuitC.length*5);
          awardXP(xp);
          addWorkoutToHistory(currentWorkout, xp);
          alert(`+${xp} XP`);
        });

        exportBtn.addEventListener('click', () => {
          if (workoutHistory.length === 0) alert('No history.');
          else navigator.clipboard?.writeText(workoutHistory.map(e=>`${e.date} | +${e.xp}XP | ${e.exercises.join('; ')}`).join('\n')).then(()=>alert('Copied!'));
        });

        resetBtn.addEventListener('click', () => {
          if (confirm('Reset level and quests?')) {
            userLevel=1; currentXP=0;
            quests.forEach(q => { q.completed = false; q.progress = (q.id==='reach_level3'?1:0); });
            saveProgress(); updateLevelDisplay(); renderQuests(); updateChart();
          }
        });

        clearHistoryBtn.addEventListener('click', () => {
          if (confirm('Clear history?')) { workoutHistory = []; saveProgress(); renderHistory(); updateChart(); updateQuestProgressFromHistory(); }
        });

        // Initial workout
        setTimeout(() => { currentWorkout = generateWorkout(['bodyweight']); renderWorkout(currentWorkout); }, 50);
      });
    })();
  </script>
</body>
