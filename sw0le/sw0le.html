    .tab-panel.active { display: block; }
    .circuit-card { background: #0a1a2a; padding: 18px; margin-bottom: 20px; border-left: 12px solid; box-shadow: 6px 6px 0 #001020; border: 3px solid #004466; border-left-width: 12px; }

    .exercise-details { padding: 0 16px 16px 16px; border-top: 2px dashed #0088cc; background: #0a1a2a; display: none; }

    .video-placeholder { background: #0f2a3a; border: 2px solid #00e6ff; padding: 12px; text-align: center; color: #a0f0ff; text-transform: uppercase; letter-spacing: 2px; margin: 10px 0; }

<body>
  <canvas id="matrix-canvas"></canvas>

  <div class="app-container">

    (function(){

      // ---------- MATRIX RAIN ----------
      const canvas = document.getElementById('matrix-canvas');
      const ctx = canvas.getContext('2d');
      let width, height, columns, drops, fontSize = 16;
      const chars = "01アイウエオカキクケコサシスセソタチツテト";
      function resizeCanvas() {
        width = window.innerWidth; height = window.innerHeight;
        canvas.width = width; canvas.height = height;
        columns = Math.floor(width / fontSize);
        drops = Array(columns).fill(1);
      }
      function drawMatrix() {
        ctx.fillStyle = 'rgba(10, 20, 40, 0.05)';
        ctx.fillRect(0, 0, width, height);
        ctx.fillStyle = '#0ff';
        ctx.font = fontSize + 'px monospace';
        for (let i=0; i<drops.length; i++) {
          ctx.fillText(chars[Math.floor(Math.random()*chars.length)], i*fontSize, drops[i]*fontSize);
          if (drops[i]*fontSize > height && Math.random() > 0.975) drops[i] = 0;
          drops[i]++;
        }
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();
      setInterval(drawMatrix, 50);

      const XP_PER_LEVEL = 100;

      function findHarderVariation(ex) {
        const same = exerciseDB.filter(e => e.baseName === ex.baseName && e.progressionLevel > ex.progressionLevel);
        return same.length ? same.sort((a,b)=>a.progressionLevel-b.progressionLevel)[0] : null;
      }

      function getFilteredExercises() {
        const equip = getSelectedEquipment();
        const muscles = getSelectedMuscles();
        return exerciseDB.filter(ex => {
          if (!ex.equipment.every(r => equip.includes(r))) return false;
          if (ex.progressionLevel > userLevel) return false;
          if (!ex.muscleGroups.some(m => muscles.includes(m))) return false;
          return true;
        });
      }

      function getSelectedEquipment() {
        return Array.from(document.querySelectorAll('#equipment-group input:checked')).map(cb=>cb.value);
      }
      function getSelectedMuscles() {
        return Array.from(document.querySelectorAll('#muscle-group input:checked')).map(cb=>cb.value);
      }

      function generateWorkout(isBoss = false) {
        const pool = getFilteredExercises();
        if (pool.length === 0) return { circuitA:[], circuitB:[], circuitC:[] };
        
        const strength = pool.filter(e => !e.isCardio);
        const cardio = pool.filter(e => e.isCardio);
        const used = new Set();
        
        const pick = (arr, filterFn) => {
          let cand = filterFn ? arr.filter(filterFn) : arr;
          cand = cand.filter(e => !used.has(e.id));
          if (cand.length === 0) cand = arr.filter(e => !used.has(e.id));
          if (cand.length === 0) return null;
          const sel = cand[Math.floor(Math.random()*cand.length)];
          used.add(sel.id);
          return sel;
        };

        const circuitA = [], circuitB = [], circuitC = [];
        const hasPrimary = (ex, ...targets) => {
          const pm = ex.primaryMuscle;
          if (!pm) return false;
          return targets.some(t => pm.includes(t));
        };

        // Circuit A: 3-5 moves
        for(let i=0; i<3+Math.floor(Math.random()*3); i++) {
          let ex = null;
          if (i===0) ex = pick(strength, e => hasPrimary(e, 'quad', 'glut'));
          else if (i===1) ex = pick(strength, e => hasPrimary(e, 'chest', 'shoulder', 'tricep'));
          else if (i===2) ex = pick(strength, e => hasPrimary(e, 'back', 'lat', 'bicep'));
          else ex = pick(strength);
          if (ex) circuitA.push(ex);
        }
        // Circuit B: 3-5 moves (ensure it's generated)
        for(let i=0; i<3+Math.floor(Math.random()*3); i++) {
          const ex = pick(strength);
          if (ex) circuitB.push(ex);
        }
        // Circuit C: finisher
        if (isBoss) {
          const bossMoves = cardio.filter(e => e.progressionLevel>=2);
          for(let i=0; i<3; i++) {
            const ex = pick(bossMoves.length ? bossMoves : cardio);
            if (ex) circuitC.push(ex);
          }
        } else {
          for(let i=0; i<1+Math.floor(Math.random()*2); i++) {
            const ex = pick(cardio);
            if (ex) circuitC.push(ex);
          }
        }

        // Fallback if any circuit empty
        if (circuitB.length === 0 && strength.length) circuitB.push(pick(strength));
        if (circuitC.length === 0 && cardio.length) circuitC.push(pick(cardio));

        const workout = { circuitA, circuitB, circuitC, isBoss, setsStatus: {} };
        [...circuitA, ...circuitB, ...circuitC].forEach(ex => { 
          workout.setsStatus[ex.id] = { completedSets: 0, weight: ex.equipment.includes('dumbbells') ? '25' : '', reps: ex.defaultReps }; 
        });
        return workout;
      }

      // ---------- RENDERING WORKOUT ----------
      function renderWorkout(workout) {
        const container = document.getElementById('workout-container');
        if (!workout || (!workout.circuitA.length && !workout.circuitB.length)) {
          container.innerHTML = '<div class="empty-message">NO MOVES MATCH FILTERS</div>';
          return;
        }

        const renderCircuit = (circuit, title, cls, totalSets) => {
          if (!circuit.length) return '';
          const items = circuit.map((ex, idx) => {
            const status = workout.setsStatus[ex.id] || { completedSets:0, weight:'', reps:ex.defaultReps };
            const repDisplay = ex.isTimed ? `${ex.defaultReps}s` : `${ex.defaultReps} reps`;
            const defaultWeight = ex.equipment.includes('dumbbells') ? '25' : (ex.equipment.includes('resistance bands') ? 'band' : '');
            return `
              <li class="exercise-item">
                <div class="exercise-summary">
                  <span class="exercise-name">🏋️ ${ex.name}</span>
                  <div style="display:flex; align-items:center; gap:10px;">
                    <span style="color:#00e6ff;">${repDisplay}</span>
                    <div class="exercise-controls">
                      <div class="tooltip">
                        <button class="icon-btn harder-btn" data-exid="${ex.id}" style="padding:6px 8px;">⬆️</button>
                        <span class="tooltiptext">Harder</span>
                      </div>
                      <button class="icon-btn toggle-details" data-exid="${ex.id}">📖</button>
                    </div>
                  </div>
                </div>
                <div class="exercise-details" id="details-${ex.id}">
                  <div class="set-logging">
                    <input type="number" placeholder="Wt" value="${status.weight || defaultWeight}" data-exid="${ex.id}" class="weight-input" ${ex.equipment.includes('bodyweight') && !ex.equipment.includes('dumbbells') ? 'disabled' : ''}>
                    <input type="number" placeholder="Reps" value="${status.reps}" data-exid="${ex.id}" class="reps-input">
                    <button class="set-complete-btn" data-exid="${ex.id}" data-sets="${totalSets}">Set ${status.completedSets+1}/${totalSets}</button>
                    <span class="set-status">${status.completedSets}/${totalSets} done</span>
                  </div>
                  <div class="exercise-instructions">📋 ${ex.instructions || 'Perform with controlled form.'}</div>
                  <div class="video-placeholder">🎥 [ YOUTUBE: ${ex.name.replace(/ /g,'+')} ]</div>
                </div>
              </li>
            `;
          }).join('');
          return `<div class="circuit-card ${cls}"><div class="circuit-header"><span>${title}</span><span>${totalSets} SETS</span></div><ul style="list-style:none;">${items}</ul></div>`;
        };

        container.innerHTML = `
          ${renderCircuit(workout.circuitA, 'CIRCUIT A', 'circuit-A', 3)}
          ${renderCircuit(workout.circuitB, 'CIRCUIT B', 'circuit-B', 2)}
          ${renderCircuit(workout.circuitC, workout.isBoss ? '🔥 BOSS FINISHER' : 'FINISHER', 'circuit-C', 1)}
          <button class="btn-secondary" id="finish-workout-btn">🏁 FINISH WORKOUT (Award XP)</button>
        `;

        // Attach listeners
        document.querySelectorAll('.toggle-details').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const exId = btn.dataset.exid;
            const details = document.getElementById(`details-${exId}`);
            details.classList.toggle('show');
          });
        });
        document.querySelectorAll('.set-complete-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const exId = btn.dataset.exid;
            const totalSets = parseInt(btn.dataset.sets);
            const status = workout.setsStatus[exId];
            if (status.completedSets < totalSets) {
              const weightInput = document.querySelector(`.weight-input[data-exid="${exId}"]`);
              const repsInput = document.querySelector(`.reps-input[data-exid="${exId}"]`);
              status.weight = weightInput.value;
              status.reps = repsInput.value;
              status.completedSets++;
              const ex = [...workout.circuitA, ...workout.circuitB, ...workout.circuitC].find(e => e.id === exId);
              weightLogs.push({
                date: new Date().toISOString(),
                exerciseId: exId,
                exerciseName: ex.name,
                weight: parseFloat(status.weight) || 0,
                reps: parseInt(status.reps) || ex.defaultReps
              });
              renderWorkout(workout);
              saveAll();
            }
          });
        });
        document.querySelectorAll('.harder-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const exId = btn.dataset.exid;
            let arr;
            if (workout.circuitA.find(e=>e.id===exId)) arr = workout.circuitA;
            else if (workout.circuitB.find(e=>e.id===exId)) arr = workout.circuitB;
            else arr = workout.circuitC;
            const idx = arr.findIndex(e=>e.id===exId);
            const harder = findHarderVariation(arr[idx]);
            if (harder) {
              arr[idx] = harder;
              workout.setsStatus[harder.id] = { completedSets:0, weight:harder.equipment.includes('dumbbells')?'25':'', reps:harder.defaultReps };
              renderWorkout(workout);
            } else alert('No harder variation yet.');
          });
        });
        document.getElementById('finish-workout-btn')?.addEventListener('click', () => finishWorkout(workout));
      }

      function finishWorkout(workout) {
        let totalXP = 0;
        let allSets = 0, completedSets = 0;
      
        // Progression multiplier: 1.0 at level 1, +0.2 per extra level
        const getProgressionMultiplier = (level) => 1 + (level - 1) * 0.2;
      
        ['A','B','C'].forEach(circ => {
          const arr = workout['circuit'+circ];
          const setsPer = circ==='A' ? 3 : (circ==='B' ? 2 : 1);
          const baseSetXP = circ==='C' ? 6 : 5;
      
          arr.forEach(ex => {
            allSets += setsPer;
            const stat = workout.setsStatus[ex.id];
            completedSets += stat.completedSets;
      
            // Get difficulty weight (default 1.0)
            const weight = ex.difficultyWeight || 1.0;
            // Progression multiplier based on exercise's progressionLevel
            const progMult = getProgressionMultiplier(ex.progressionLevel || 1);
      
            // XP for this exercise's completed sets
            totalXP += stat.completedSets * baseSetXP * progMult * weight;
          });
        });
      
        // Boss bonus
        if (workout.isBoss) totalXP += 30;
      
        // Round to integer
        totalXP = Math.round(totalXP);
      
        awardXP(totalXP);
      
        const entry = {
          date: new Date().toLocaleString(),
          exercises: [...workout.circuitA, ...workout.circuitB, ...workout.circuitC].map(e => e.name),
          xp: totalXP,
          setsCompleted: completedSets,
          details: workout.setsStatus
        };
        workoutHistory.unshift(entry);
        saveAll();
        renderHistory();
        updateQuests(workout);
      
        alert(`Workout complete! +${totalXP} XP (${completedSets}/${allSets} sets)`);
        currentWorkout = null;
        document.getElementById('workout-container').innerHTML = '<div class="empty-message">[ PRESS ROLL OR BUILD ]</div>';
      }
      // ---------- BUILDER MODE ----------
      function renderBuilder() {
        const pool = getFilteredExercises();
        const availDiv = document.getElementById('available-exercises');
        const selDiv = document.getElementById('selected-exercises');
        const updateCount = () => document.getElementById('selected-count').textContent = customSelectedExercises.length;

        function renderLists() {
          const selectedIds = new Set(customSelectedExercises.map(e=>e.id));
          const available = pool.filter(e => !selectedIds.has(e.id));
          availDiv.innerHTML = available.map(ex => `
            <div class="builder-item">
              <span>${ex.name} (${ex.primaryMuscle||''})</span>
              <button class="btn-secondary add-to-custom" data-id="${ex.id}">➕ Add</button>
            </div>
          `).join('');
          selDiv.innerHTML = customSelectedExercises.map(ex => `
            <div class="builder-item">
              <span>${ex.name}</span>
              <button class="btn-secondary remove-from-custom" data-id="${ex.id}">❌ Remove</button>
            </div>
          `).join('');
          updateCount();
          attachBuilderEvents();
        }

        function attachBuilderEvents() {
          document.querySelectorAll('.add-to-custom').forEach(btn => {
            btn.addEventListener('click', () => {
              const ex = pool.find(e => e.id === btn.dataset.id);
              if (ex) customSelectedExercises.push(ex);
              renderLists();
            });
          });
          document.querySelectorAll('.remove-from-custom').forEach(btn => {
            btn.addEventListener('click', () => {
              customSelectedExercises = customSelectedExercises.filter(e => e.id !== btn.dataset.id);
              renderLists();
            });
          });
        }

        renderLists();

        document.getElementById('exercise-search').addEventListener('input', (e) => {
          const term = e.target.value.toLowerCase();
          document.querySelectorAll('#available-exercises .builder-item').forEach(el => {
            el.style.display = el.textContent.toLowerCase().includes(term) ? 'flex' : 'none';
          });
        });
      }

      // ---------- METRICS ----------
      let weightChart, xpChart;
      function updateMetrics() {
        const select = document.getElementById('exercise-select-metrics');
        select.innerHTML = '<option value="">-- Select --</option>' + 
          [...new Set(weightLogs.map(l => l.exerciseId))].map(id => {
            const name = weightLogs.find(l => l.exerciseId === id).exerciseName;
            return `<option value="${id}">${name}</option>`;
          }).join('');
        
        if (weightChart) weightChart.destroy();
        if (xpChart) xpChart.destroy();
        
        const ctx1 = document.getElementById('weight-chart').getContext('2d');
        weightChart = new Chart(ctx1, { type:'line', data:{ labels:[], datasets:[] }, options:{ responsive:true } });
        
        const ctx2 = document.getElementById('xp-chart').getContext('2d');
        const last7 = [...Array(7)].map((_,i) => {
          const d = new Date(); d.setDate(d.getDate()-i);
          return d.toLocaleDateString();
        }).reverse();
        const xpData = last7.map(day => workoutHistory.filter(e => e.date.includes(day)).reduce((s,e)=>s+e.xp,0));
        xpChart = new Chart(ctx2, { type:'bar', data:{ labels:last7, datasets:[{ label:'XP', data:xpData, backgroundColor:'#00e6ff' }] } });
        
        select.addEventListener('change', (e) => {
          const exId = e.target.value;
          if (!exId) return;
          const logs = weightLogs.filter(l => l.exerciseId === exId).sort((a,b)=>new Date(a.date)-new Date(b.date));
          weightChart.data.labels = logs.map(l => new Date(l.date).toLocaleDateString());
          weightChart.data.datasets = [{ label:'Weight (lbs)', data:logs.map(l=>l.weight), borderColor:'#00ffaa' }];
          weightChart.update();
        });
      }

      // ---------- EXPORT AS MARKDOWN (OBSIDIAN) ----------
      function exportMarkdown() {
        if (workoutHistory.length === 0) { alert('No history to export.'); return; }
        const last = workoutHistory[0];
        let md = `# Workout ${last.date}\n\n`;
        md += `**XP**: +${last.xp}  |  **Sets Completed**: ${last.setsCompleted}  |  **Level**: ${last.level || userLevel}\n\n`;
        md += `## Exercises\n`;
        const exNames = [...new Set(last.exercises)];
        exNames.forEach(name => {
          md += `- ${name}\n`;
        });
        md += `\n## Details\n`;
        if (last.details) {
          Object.entries(last.details).forEach(([id, stat]) => {
            const ex = exerciseDB.find(e => e.id === id);
            if (ex) md += `- **${ex.name}**: ${stat.completedSets} sets, ${stat.weight} lbs × ${stat.reps} reps\n`;
          });
        }
        md += `\n---\n*Generated by SW0LE // ROGUE IRON*`;
        navigator.clipboard?.writeText(md).then(() => alert('📝 Markdown journal copied to clipboard!'));
      }

      // ---------- PERSISTENCE ----------
      function saveAll() {
        localStorage.setItem('sw0le_progress', JSON.stringify({ level:userLevel, xp:currentXP }));
        localStorage.setItem('sw0le_history', JSON.stringify(workoutHistory));
        localStorage.setItem('sw0le_weightlogs', JSON.stringify(weightLogs));
        localStorage.setItem('sw0le_quests', JSON.stringify(quests));
      }
      function loadAll() {
        try {
          const prog = JSON.parse(localStorage.getItem('sw0le_progress')||'{}');
          userLevel = prog.level||1; currentXP = prog.xp||0;
          workoutHistory = JSON.parse(localStorage.getItem('sw0le_history')||'[]');
          weightLogs = JSON.parse(localStorage.getItem('sw0le_weightlogs')||'[]');
          quests = JSON.parse(localStorage.getItem('sw0le_quests')||'[]');
        } catch(e) {}
        updateLevelDisplay();
        renderHistory();
        renderQuests();
      }
      function updateLevelDisplay() {
        document.getElementById('user-level').textContent = userLevel;
        document.getElementById('xp-bar').style.width = Math.min((currentXP/XP_PER_LEVEL)*100,100)+'%';
        document.getElementById('xp-text').textContent = `${currentXP}/${XP_PER_LEVEL}`;
      }
      function awardXP(amt) { currentXP += amt; while(currentXP>=XP_PER_LEVEL) { currentXP-=XP_PER_LEVEL; userLevel++; } updateLevelDisplay(); saveAll(); }
      function renderHistory() {
        const div = document.getElementById('history-log');
        div.innerHTML = workoutHistory.slice(0,10).map(e => `<div class="history-entry"><span>${e.date}</span><span>+${e.xp} XP</span></div>`).join('') || '<div class="empty-message">No history</div>';
      }
      function renderQuests() {
        const list = document.getElementById('quest-list');
        list.innerHTML = quests.map(q => `<li class="quest-item"><span>${q.completed?'✅':'⬜'} ${q.desc} (${q.progress}/${q.target})</span><span>+${q.reward} XP</span></li>`).join('');
      }
      function updateQuests(workout) {
        const firstQuest = quests.find(q=>q.id==='first');
        if (firstQuest && !firstQuest.completed) { firstQuest.progress=1; firstQuest.completed=true; awardXP(firstQuest.reward); }
        if (workout.isBoss) { const bossQ = quests.find(q=>q.id==='boss'); if(bossQ&&!bossQ.completed){ bossQ.progress=1; bossQ.completed=true; awardXP(bossQ.reward); } }
        renderQuests();
      }

      // ---------- EVENT LISTENERS ----------
      document.addEventListener('DOMContentLoaded', () => {
        loadAll();
        document.getElementById('randomize-btn').addEventListener('click', () => {
          currentWorkout = generateWorkout(false);
          renderWorkout(currentWorkout);
        });
        document.getElementById('boss-btn').addEventListener('click', () => {
          currentWorkout = generateWorkout(true);
          renderWorkout(currentWorkout);
        });
        document.getElementById('builder-mode-btn').addEventListener('click', () => {
          document.getElementById('builder-panel').style.display = 'block';
          customSelectedExercises = [];
          renderBuilder();
        });
        document.getElementById('close-builder').addEventListener('click', () => {
          document.getElementById('builder-panel').style.display = 'none';
        });
        document.getElementById('build-custom-workout').addEventListener('click', () => {
          if (customSelectedExercises.length === 0) { alert('Select at least one exercise!'); return; }
          const circuitA = customSelectedExercises.slice(0,5);
          const circuitB = customSelectedExercises.slice(5,10);
          const circuitC = customSelectedExercises.slice(10,12);
          currentWorkout = { circuitA, circuitB, circuitC, isBoss: false, setsStatus: {} };
          [...circuitA, ...circuitB, ...circuitC].forEach(ex => { currentWorkout.setsStatus[ex.id] = { completedSets:0, weight:ex.equipment.includes('dumbbells')?'25':'', reps:ex.defaultReps }; });
          renderWorkout(currentWorkout);
          document.getElementById('builder-panel').style.display = 'none';
        });
        document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
          document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById(btn.dataset.tab+'-panel').classList.add('active');
          if (btn.dataset.tab === 'metrics') updateMetrics();
        }));
        document.getElementById('export-btn').addEventListener('click', () => {
          const data = JSON.stringify({ history: workoutHistory, weightLogs, level: userLevel });
          navigator.clipboard?.writeText(data).then(()=>alert('Exported JSON to clipboard'));
        });
        document.getElementById('md-export-btn').addEventListener('click', exportMarkdown);
        document.getElementById('reset-progress-btn').addEventListener('click', () => {
          if (confirm('Reset all progress?')) {
            userLevel=1; currentXP=0; workoutHistory=[]; weightLogs=[];
            quests.forEach(q => { q.completed=false; q.progress=(q.id==='level5'?1:0); });
            saveAll(); location.reload();
          }
        });
        // Initial empty state
      });
    })();
  </script>
</body>
