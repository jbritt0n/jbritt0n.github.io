function mkSvg(group, aspect, idx) {
  var p = (PAL[group]||PAL.painting)[idx % (PAL[group]||PAL.painting).length];
  var isLand = aspect === 'landscape', isSq = aspect === 'square';
  var w = isLand ? 500 : 400, h = isLand ? 380 : isSq ? 400 : 500;
  var id = 's' + idx + (Math.random()*1e6|0);
  return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;display:block">
    <defs>
      <radialGradient id="${id}" cx="44%" cy="42%" r="65%">
        <stop offset="0%" stop-color="${p[0]}"/>
        <stop offset="100%" stop-color="#080706"/>
      </radialGradient>
      <filter id="f${id}"><feGaussianBlur stdDeviation="12"/></filter>
    </defs>
    <rect width="${w}" height="${h}" fill="url(#${id})"/>
    <ellipse cx="${(w*.47)|0}" cy="${(h*.43)|0}" rx="${(w*.43)|0}" ry="${(h*.38)|0}" fill="${p[1]}" opacity="0.5" filter="url(#f${id})"/>
    <ellipse cx="${(w*.72)|0}" cy="${(h*.71)|0}" rx="${(w*.3)|0}" ry="${(h*.26)|0}" fill="${p[2]}" opacity="0.28" filter="url(#f${id})"/>
    <rect width="${w}" height="${h}" fill="rgba(8,7,6,0.15)"/>
  </svg>`;
}

// ─────────────────────────────────────────────────────────────────────────
// PROTECTION LAYER 2 & 3 – Canvas rendering + watermark
// Draws an image onto a canvas, adds a small copyright watermark.
// Returns a canvas element (or null on error).
// ─────────────────────────────────────────────────────────────────────────
function createCanvasFromImage(src, alt, aspectClass, width = null, height = null) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.crossOrigin = "Anonymous"; // if images are on same domain this is fine
  img.src = src;

  return new Promise((resolve) => {
    img.onload = () => {
      let targetWidth, targetHeight;
      // Determine dimensions based on aspect class or natural size
      if (aspectClass === 'landscape') {
        targetWidth = 500;
        targetHeight = 380;
      } else if (aspectClass === 'square') {
        targetWidth = 400;
        targetHeight = 400;
      } else {
        targetWidth = 400;
        targetHeight = 500;
      }
      // If explicit width/height given (for lightbox)
      if (width && height) {
        targetWidth = width;
        targetHeight = height;
      }
      canvas.width = targetWidth;
      canvas.height = targetHeight;
      ctx.drawImage(img, 0, 0, targetWidth, targetHeight);
      // Watermark (subtle)
      ctx.font = "12px 'Jost', sans-serif";
      ctx.fillStyle = "rgba(255,255,240,0.35)";
      ctx.shadowBlur = 0;
      ctx.fillText("© Jonathan Britton", targetWidth - 110, targetHeight - 8);
      // Add data attribute for alt text
      canvas.setAttribute('alt', alt);
      canvas.style.display = 'block';
      canvas.style.width = '100%';
      canvas.style.height = '100%';
      resolve(canvas);
    };
    img.onerror = () => {
      // Fallback to SVG placeholder
      const fallbackDiv = document.createElement('div');
      fallbackDiv.innerHTML = mkSvg('painting', aspectClass, Math.floor(Math.random()*1000));
      const fallbackCanvas = fallbackDiv.firstChild;
      resolve(fallbackCanvas);
    };
  });
}

// Store references for lazy loading
let canvasObserver = null;

function initCanvasObserver() {
  if (canvasObserver) canvasObserver.disconnect();
  canvasObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const canvasPlaceholder = entry.target;
        const src = canvasPlaceholder.getAttribute('data-src');
        const alt = canvasPlaceholder.getAttribute('data-alt');
        const aspect = canvasPlaceholder.getAttribute('data-aspect');
        if (src && !canvasPlaceholder.hasChildNodes()) {
          createCanvasFromImage(src, alt, aspect).then(canvas => {
            canvasPlaceholder.appendChild(canvas);
            canvasObserver.unobserve(canvasPlaceholder);
          });
        }
      }
    });
  }, { threshold: 0.1, rootMargin: '100px' });
  return canvasObserver;
}

var allWorks = [];

function build(group) {
  var container = document.getElementById('worksContainer');
  container.innerHTML = '';
  allWorks = [];

  var def = WORKS[group];
  var isStudies = !!def.isStudies;
  var total = def.years.reduce(function(a,y){return a+y.works.length;},0);

  document.getElementById('pageTitle').innerHTML = def.label;
  document.getElementById('pageCount').textContent = def.empty ? '' : (total + ' work' + (total!==1?'s':''));

  var noteEl = document.getElementById('groupNote');
  if (def.note) { noteEl.textContent = def.note; noteEl.style.display = 'block'; }
  else noteEl.style.display = 'none';

  if (def.empty) {
    container.innerHTML = `<div class="empty-section">
      <p class="empty-title">Nothing here yet.</p>
      <p class="empty-note">${def.emptyMessage||''}</p>
    </div>`;
    return;
  }

  var idx = 0;
  def.years.forEach(function(yr) {
    var block = document.createElement('div');
    block.className = 'works-year-block';
    var lbl = document.createElement('div');
    lbl.className = 'year-label';
    lbl.textContent = yr.year;
    block.appendChild(lbl);

    var grid = document.createElement('div');
    grid.className = 'works-grid' + (isStudies ? ' studies-grid-inner' : '');

    yr.works.forEach(function(w) {
      var wi = idx++;
      allWorks.push({work:w, group:group, idx:wi});

      var card = document.createElement('div');
      card.className = 'work-card';

      var thumb = document.createElement('div');
      var asp = isStudies ? '' : (w.aspect||'');
      thumb.className = 'work-thumb' + (asp ? ' '+asp : '');

      if (w.img) {
        // Create a placeholder div that will be filled by IntersectionObserver
        const placeholder = document.createElement('div');
        placeholder.style.width = '100%';
        placeholder.style.height = '100%';
        placeholder.setAttribute('data-src', w.img);
        placeholder.setAttribute('data-alt', w.title);
        placeholder.setAttribute('data-aspect', asp);
        thumb.appendChild(placeholder);
        // Start observing this placeholder
        if (!canvasObserver) initCanvasObserver();
        canvasObserver.observe(placeholder);
      } else {
        thumb.innerHTML = mkSvg(group, asp, wi);
      }

      var ov = document.createElement('div');
      ov.className = 'work-thumb-overlay';
      ov.innerHTML = '<span class="inquire-hint">View</span>';
      thumb.appendChild(ov);

      var meta = document.createElement('div');
      meta.className = 'work-card-meta';
      meta.innerHTML = `
        <div class="work-card-title">${w.title}</div>
        <div class="work-card-info">
          ${w.medium}${!isStudies && w.size ? ' · '+w.size : ''}<br>
          <span class="${w.available?'avail':'private collection'}">${w.available?(w.price?'$'+w.price.toLocaleString()+' — available':'Available'):'Private Collection'}</span>
        </div>`;

      card.appendChild(thumb);
      card.appendChild(meta);
      card.addEventListener('click', (function(i){return function(){openLb(i);};})(wi));
      grid.appendChild(card);
    });

    block.appendChild(grid);
    container.appendChild(block);
  });
}

// Lightbox with canvas (no download possible)
function openLb(idx) {
  var item = allWorks.find(function(x){return x.idx===idx;});
  if (!item) return;
  var w = item.work, g = item.group, def = WORKS[g];
  var isStudies = !!def.isStudies;
  
  // For lightbox we also create a canvas, but larger (max 90vw/90vh)
  const lbInner = document.getElementById('lbInner');
  lbInner.innerHTML = '<div class="lb-loading">Loading...</div>';
  
  if (w.img) {
    // Create a high-res canvas for the lightbox
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.crossOrigin = "Anonymous";
    img.src = w.img;
    img.onload = () => {
      // Determine display size – limit to 90vh/90vw but keep aspect ratio
      let maxWidth = window.innerWidth * 0.85;
      let maxHeight = window.innerHeight * 0.75;
      let ratio = img.width / img.height;
      let drawWidth = img.width, drawHeight = img.height;
      if (drawWidth > maxWidth) {
        drawWidth = maxWidth;
        drawHeight = drawWidth / ratio;
      }
      if (drawHeight > maxHeight) {
        drawHeight = maxHeight;
        drawWidth = drawHeight * ratio;
      }
      canvas.width = drawWidth;
      canvas.height = drawHeight;
      ctx.drawImage(img, 0, 0, drawWidth, drawHeight);
      // Watermark on lightbox as well
      ctx.font = "14px 'Jost', sans-serif";
      ctx.fillStyle = "rgba(255,255,240,0.4)";
      ctx.fillText("© Jonathan Britton", drawWidth - 120, drawHeight - 12);
      
      const inquireHref = w.available ? 'contact.html?painting='+encodeURIComponent(w.title) : null;
      const defaultNote = isStudies
        ? (w.available ? 'Small works ship flat. Happy to chat about it.' : 'This one is gone — but I make similar things often. Get in touch if you\'d like to know when new studies are available.')
        : (w.available ? 'Happy to answer questions, share more photos, or arrange a viewing.' : 'This work has been sold. Similar commissions considered on request.');
      const note = w.note || defaultNote;
      
      lbInner.innerHTML = `
        <div class="lb-image"></div>
        <div class="lb-info">
          <div class="lb-title">${w.title}</div>
          <div class="lb-meta">
            <span>${w.medium}</span>
            ${!isStudies&&w.size?`<span>${w.size}</span>`:''}
          </div>
          ${w.available&&w.price?`<div class="lb-price">$${w.price.toLocaleString()}</div>`:''}
          <div class="lb-note">${note}</div>
          ${inquireHref
            ? `<a href="${inquireHref}" class="lb-inquire">Inquire about this work</a>`
            : `<span style="font-family:'Jost',sans-serif;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--dim)">Private Collection</span>`}
        </div>`;
      const lbImageDiv = lbInner.querySelector('.lb-image');
      lbImageDiv.appendChild(canvas);
      document.getElementById('lb').classList.add('open');
    };
    img.onerror = () => {
      lbInner.innerHTML = `<div class="lb-info">Error loading image</div>`;
      document.getElementById('lb').classList.add('open');
    };
  } else {
    // Fallback to SVG placeholder
    var visual = mkSvg(g, isStudies?'':(w.aspect||''), idx);
    const inquireHref = w.available ? 'contact.html?painting='+encodeURIComponent(w.title) : null;
    const defaultNote = isStudies
      ? (w.available ? 'Small works ship flat. Happy to chat about it.' : 'This one is gone — but I make similar things often. Get in touch if you\'d like to know when new studies are available.')
      : (w.available ? 'Happy to answer questions, share more photos, or arrange a viewing.' : 'This work has been sold. Similar commissions considered on request.');
    const note = w.note || defaultNote;
    lbInner.innerHTML = `
      <div class="lb-image">${visual}</div>
      <div class="lb-info">
        <div class="lb-title">${w.title}</div>
        <div class="lb-meta">
          <span>${w.medium}</span>
          ${!isStudies&&w.size?`<span>${w.size}</span>`:''}
        </div>
        ${w.available&&w.price?`<div class="lb-price">$${w.price.toLocaleString()}</div>`:''}
        <div class="lb-note">${note}</div>
        ${inquireHref
          ? `<a href="${inquireHref}" class="lb-inquire">Inquire about this work</a>`
          : `<span style="font-family:'Jost',sans-serif;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--dim)">Private Collection</span>`}
      </div>`;
    document.getElementById('lb').classList.add('open');
  }
}

function closeLb() { document.getElementById('lb').classList.remove('open'); }
function lbBg(e) { if (e.target===document.getElementById('lb')) closeLb(); }
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeLb();});

function sw(group, el) {
  document.querySelectorAll('.medium-nav a, .nav-dropdown a').forEach(function(a){a.classList.remove('active');});
  document.querySelectorAll('[href="#'+group+'"]').forEach(function(a){a.classList.add('active');});
  history.replaceState(null,'','#'+group);
  build(group);
  window.scrollTo({top:0,behavior:'smooth'});
}

var valid = ['painting','works-on-paper','charcoal-pastel','encaustic','collage','printmaking','studies'];
var hash = window.location.hash.replace('#','') || 'painting';
if (!valid.includes(hash)) hash = 'painting';
build(hash);
document.querySelectorAll('[href="#'+hash+'"]').forEach(function(a){a.classList.add('active');});

// Start the canvas observer after build
initCanvasObserver();
</script>
