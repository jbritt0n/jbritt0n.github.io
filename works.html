<style>
  /* Empty section */
  .empty-section {
    padding: 4rem 2.5rem;
    border-top: 1px solid var(--stone);
    margin: 2rem 2.5rem 0;
  }
  .empty-title { font-style: italic; font-size: 1rem; color: var(--dim); margin-bottom: 0.6rem; }
  .empty-note {
    font-family: 'Jost', sans-serif; font-size: 0.6rem;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--stone); line-height: 2;
  }
  /* Studies denser grid */
  .studies-grid-inner {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 1.1rem 1rem;
    margin-bottom: 3rem;
  }
  /* Sub-note line */
  #groupNote {
    padding: 0.7rem 2.5rem 0;
    font-family: 'Jost', sans-serif;
    font-size: 0.54rem; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--stone);
    display: none;
  }
  @media(max-width:640px){
    .empty-section { padding: 2.5rem 1.5rem; margin: 1.5rem 1.5rem 0; }
    #groupNote { padding: 0.7rem 1.5rem 0; }
  }

// SVG colour palettes per group
const PAL = {
  painting:         [['#2a3d52','#1a2535','#8b5c2a'],['#3a1e14','#1e1008','#7a3020'],['#1e2e1e','#0e1808','#4a6a30'],['#2a2040','#151020','#6040a0']],
  'works-on-paper': [['#3a4020','#1e2210','#6a7030'],['#3a2030','#1e1018','#704050'],['#4a3828','#281e14','#8a6040']],
  'charcoal-pastel':[['#282420','#141210','#605848'],['#201c18','#100e0c','#504038'],['#281c18','#140e0c','#604038']],
  encaustic:        [['#5a4020','#2e2010','#c0901a']],
  collage:          [['#3a3028','#201a14','#706040'],['#2a2e20','#141810','#506030'],['#302830','#181418','#605060']],
  printmaking:      [['#181410','#0c0a08','#3a3028'],['#101210','#080a08','#202820']],
  studies:          [['#2a3040','#141820','#506070'],['#3a2818','#1c1408','#706040'],['#2a2030','#141018','#504060'],['#203020','#101810','#405040'],['#302018','#180e0c','#705030'],['#1a2820','#0c1410','#305040']],
};

function mkSvg(group, aspect, idx) {
  var p = (PAL[group]||PAL.painting)[idx % (PAL[group]||PAL.painting).length];
  var isLand = aspect === 'landscape', isSq = aspect === 'square';
  var w = isLand ? 500 : 400, h = isLand ? 380 : isSq ? 400 : 500;
  var id = 's' + idx + (Math.random()*1e6|0);
  return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;display:block">
    <defs>
      <radialGradient id="${id}" cx="44%" cy="42%" r="65%">
        <stop offset="0%" stop-color="${p[0]}"/>
        <stop offset="100%" stop-color="#080706"/>
      </radialGradient>
      <filter id="f${id}"><feGaussianBlur stdDeviation="12"/></filter>
    </defs>
    <rect width="${w}" height="${h}" fill="url(#${id})"/>
    <ellipse cx="${(w*.47)|0}" cy="${(h*.43)|0}" rx="${(w*.43)|0}" ry="${(h*.38)|0}" fill="${p[1]}" opacity="0.5" filter="url(#f${id})"/>
    <ellipse cx="${(w*.72)|0}" cy="${(h*.71)|0}" rx="${(w*.3)|0}" ry="${(h*.26)|0}" fill="${p[2]}" opacity="0.28" filter="url(#f${id})"/>
    <rect width="${w}" height="${h}" fill="rgba(8,7,6,0.15)"/>
  </svg>`;
}

var allWorks = [];

function build(group) {
  var container = document.getElementById('worksContainer');
  container.innerHTML = '';
  allWorks = [];

  var def = WORKS[group];
  var isStudies = !!def.isStudies;
  var total = def.years.reduce(function(a,y){return a+y.works.length;},0);

  document.getElementById('pageTitle').innerHTML = def.label;
  document.getElementById('pageCount').textContent = def.empty ? '' : (total + ' work' + (total!==1?'s':''));

  var noteEl = document.getElementById('groupNote');
  if (def.note) { noteEl.textContent = def.note; noteEl.style.display = 'block'; }
  else noteEl.style.display = 'none';

  if (def.empty) {
    container.innerHTML = `<div class="empty-section">
      <p class="empty-title">Nothing here yet.</p>
      <p class="empty-note">${def.emptyMessage||''}</p>
    </div>`;
    return;
  }

  var idx = 0;
  def.years.forEach(function(yr) {
    var block = document.createElement('div');
    block.className = 'works-year-block';
    var lbl = document.createElement('div');
    lbl.className = 'year-label';
    lbl.textContent = yr.year;
    block.appendChild(lbl);

    var grid = document.createElement('div');
    grid.className = 'works-grid' + (isStudies ? ' studies-grid-inner' : '');

    yr.works.forEach(function(w) {
      var wi = idx++;
      allWorks.push({work:w, group:group, idx:wi});

      var card = document.createElement('div');
      card.className = 'work-card';

      var thumb = document.createElement('div');
      var asp = isStudies ? '' : (w.aspect||'');
      thumb.className = 'work-thumb' + (asp ? ' '+asp : '');

      // Use real image if provided, otherwise SVG placeholder
      if (w.img) {
        thumb.innerHTML = `<img src="${w.img}" alt="${w.title}" loading="lazy">`;
      } else {
        thumb.innerHTML = mkSvg(group, asp, wi);
      }

      var ov = document.createElement('div');
      ov.className = 'work-thumb-overlay';
      ov.innerHTML = '<span class="inquire-hint">View</span>';
      thumb.appendChild(ov);

      var meta = document.createElement('div');
      meta.className = 'work-card-meta';
      meta.innerHTML = `
        <div class="work-card-title">${w.title}</div>
        <div class="work-card-info">
          ${w.medium}${!isStudies && w.size ? ' · '+w.size : ''}<br>
          <span class="${w.available?'avail':'private collection'}">${w.available?(w.price?'$'+w.price.toLocaleString()+' — available':'Available'):'Private Collection'}</span>
        </div>`;

      card.appendChild(thumb);
      card.appendChild(meta);
      card.addEventListener('click', (function(i){return function(){openLb(i);};})(wi));
      grid.appendChild(card);
    });

    block.appendChild(grid);
    container.appendChild(block);
  });
}

function openLb(idx) {
  var item = allWorks.find(function(x){return x.idx===idx;});
  if (!item) return;
  var w = item.work, g = item.group, def = WORKS[g];
  var isStudies = !!def.isStudies;
  var visual = w.img
    ? `<img src="${w.img}" alt="${w.title}" style="max-height:70vh;width:auto;max-width:100%;display:block;">`
    : mkSvg(g, isStudies?'':(w.aspect||''), idx);

  var inquireHref = w.available ? 'contact.html?painting='+encodeURIComponent(w.title) : null;
  var note = isStudies
    ? (w.available ? 'Small works ship flat. Happy to chat about it.' : 'This one is gone — but I make similar things often. Get in touch if you\'d like to know when new studies are available.')
    : (w.available ? 'Happy to answer questions, share more photos, or arrange a viewing.' : 'This work is unavailable. Similar commissions considered on request.');

  document.getElementById('lbInner').innerHTML = `
    <div class="lb-image">${visual}</div>
    <div class="lb-info">
      <div class="lb-title">${w.title}</div>
      <div class="lb-meta">
        <span>${w.medium}</span>
        ${!isStudies&&w.size?`<span>${w.size}</span>`:''}
      </div>
      ${w.available&&w.price?`<div class="lb-price">$${w.price.toLocaleString()}</div>`:''}
      <div class="lb-note">${note}</div>
      ${inquireHref
        ? `<a href="${inquireHref}" class="lb-inquire">Inquire about this work</a>`
        : `<span style="font-family:'Jost',sans-serif;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--dim)">Sold</span>`}
    </div>`;
  document.getElementById('lb').classList.add('open');
}

function closeLb() { document.getElementById('lb').classList.remove('open'); }
function lbBg(e) { if (e.target===document.getElementById('lb')) closeLb(); }
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeLb();});

function sw(group, el) {
  document.querySelectorAll('.medium-nav a, .nav-dropdown a').forEach(function(a){a.classList.remove('active');});
  document.querySelectorAll('[href="#'+group+'"]').forEach(function(a){a.classList.add('active');});
  history.replaceState(null,'','#'+group);
  build(group);
  window.scrollTo({top:0,behavior:'smooth'});
}

var valid = ['painting','works-on-paper','charcoal-pastel','encaustic','collage','printmaking','studies'];
var hash = window.location.hash.replace('#','') || 'painting';
if (!valid.includes(hash)) hash = 'painting';
build(hash);
document.querySelectorAll('[href="#'+hash+'"]').forEach(function(a){a.classList.add('active');});
</script>
