  deep:{fx:'ink density HIGH · dark palette pull'},

function syl(w){
  w=w.toLowerCase().replace(/[^a-z]/g,'');
  if(!w)return 0;
  if(w.length<=3)return 1;
  w=w.replace(/(?:[^laeiouy]es|ed|[^laeiouy]e)$/,'');
  w=w.replace(/^y/,'');
  const m=w.match(/[aeiouy]{1,2}/g);
  return m?Math.max(1,m.length):1;
}
function lineSyl(line){
  return line.trim().split(/\s+/).reduce((s,w)=>s+syl(w),0);
}
function esc(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlight(text,errors){
  const errMap={};
  errors.forEach(e=>{if(e.k)errMap[e.k]=e.type});
  return text.split('\n').map((line,li)=>{
    if(!line)return '';
    const tr=line.trim();
    if(tr.startsWith('//')){return`<span class="tc">${esc(line)}</span>`}
    if(tr.startsWith('seed:')){return`<span class="ts">${esc(line)}</span>`}
    let wc=-1;
    return line.split(/(\s+)/).map(tok=>{
      if(!tok.trim())return esc(tok);
      wc++;
      const cl=tok.toLowerCase().replace(/[.,!?—\[\]()\u2026\u2014]/g,'');
      let cls='';
      if(VB[cl])cls='tv';
      else if(NN[cl])cls='tn';
      else if(KG[cl])cls='tk';
      else if(MD[cl])cls='tm';
      else if(tok.match(/^[.,!?—\[\]()\u2026\u2014…]+$/))cls='ts';
      const ek=li+'-'+wc;
      const ec=errMap[ek]==='error'?' te':errMap[ek]==='warning'?' tw2':'';
      if(cls||ec)return`<span class="${cls}${ec}" data-w="${cl}" data-li="${li}" data-wi="${wc}">${esc(tok)}</span>`;
      return esc(tok);
    }).join('');
  }).join('\n');
}

function checkErrors(text){
  const errs=[];
  let bk=0,pk=0;
  text.split('\n').forEach((line,li)=>{
    const tr=line.trim();
    if(!tr||tr.startsWith('//')||tr.startsWith('seed:'))return;
    const words=line.toLowerCase().split(/\s+/);
    const ws=words.map(w=>w.replace(/[.,!?—\[\]()\u2026\u2014]/g,''));
    const vs=ws.filter(w=>VB[w]);
    const hasScatter=vs.some(v=>['scatters','scatter','breaks','frays','breaks'].includes(v));
    const hasHold=vs.some(v=>['holds','hold','rests','waits','stills'].includes(v));
    if(hasScatter&&hasHold){
      errs.push({k:null,line:li+1,type:'error',
        msg:`Line ${li+1} — <em>scatter</em> and <em>hold</em> oppose one another. A stroke cannot fracture and remain still. Choose the moment before, or the moment after.`});
    }
    ws.forEach((w,wi)=>{
      if(w.length<4)return;
      if(VB[w]||NN[w]||KG[w]||MD[w])return;
      const stopwords=new Set(['the','and','into','onto','with','from','that','this','a','an','in','of','on','at','by','for','as','is','are','was','were','its','upon','when','then','yet','nor','but','so','if','or','it','to','be','do','my','our','your','his','her','their','across','through','under','over','within','without','between','among','along','around','behind','before','after','during','beyond','down','up','out','off','even','only','just','not','no','all','both','each','few','more','most','other','such','own','same','than','too','very','can','will','would','could','should','may','might','shall','must','have','has','had','am','here','there','where','how','who','what','which','whose']);
      if(stopwords.has(w))return;
      errs.push({k:li+'-'+wi,line:li+1,type:'notice',
        msg:`Line ${li+1} — "<em>${w}</em>" is not in the saijiki. The metaphor resolver holds it as void — which may be exactly right.`});
    });
    const s=lineSyl(line);
    if(s>10){
      errs.push({k:null,line:li+1,type:'warning',
        msg:`Line ${li+1} — ${s} syllables registered. Yūgen penalty ×0.70 applied. The excess weight is held, not discarded. Does the line earn its length?`});
    }
    for(const ch of line){
      if(ch==='[')bk++;
      else if(ch===']'){bk--;if(bk<0){errs.push({k:li+'-0',line:li+1,type:'error',msg:`Line ${li+1} — a closing echo ] without an opening. The ripple has no source to return to.`});bk=0;}}
      else if(ch==='(')pk++;
      else if(ch===')'){pk--;if(pk<0){errs.push({k:li+'-0',line:li+1,type:'error',msg:`Line ${li+1} — a closing whisper ) before it was opened. The breath was never held.`});pk=0;}}
    }
  });
  if(bk>0)errs.push({k:null,line:'end',type:'error',msg:`Manuscript end — ${bk} echo bracket[s] remain open. The resonance continues past the poem's edge. Add ] to release it.`});
  return errs;
}

function updateGutter(text){
  const lines=text.split('\n');
  let ln='',sh='';
  lines.forEach((line,i)=>{
    ln+=(i+1)+'\n';
    const tr=line.trim();
    const s=tr&&!tr.startsWith('//')&&!tr.startsWith('seed:')?lineSyl(line):0;
    if(!s){sh+=`<span class="syl-g"> </span>`;return;}
    const c=s===5?'syl-5':s===7?'syl-7':'syl-x';
    sh+=`<span class="syl-g ${c}">${s}</span>`;
  });
  document.getElementById('lnums').textContent=ln;
  document.getElementById('shints').innerHTML=sh;
}

function renderErrors(errs){
  const el=document.getElementById('erlist');
  const ct=document.getElementById('erct');
  const ec=errs.filter(e=>e.type==='error').length;
  if(!errs.length){
    ct.style.display='none';
    el.innerHTML=`<div style="font-size:12px;color:var(--color-text-tertiary);font-style:italic;padding:4px 0">the manuscript is clear — no disturbances in the residue.</div>`;
    return;
  }
  ct.style.display='inline';
  ct.textContent=ec+' error'+(ec!==1?'s':'');
  el.innerHTML=errs.slice(0,5).map(e=>{
    const cls=e.type==='error'?'e':e.type==='warning'?'w':'n';
    return`<div class="bei ${cls}"><span class="bei-loc">line ${e.line}</span>${e.msg}</div>`;
  }).join('');
}

  else{inner+=`<rect x="0" y="220" width="380" height="100" fill="${pal.ac}" opacity="0.08"/>`;}
  if(hasPond){inner+=`<ellipse cx="190" cy="285" rx="110" ry="18" fill="${pal.ink}" opacity="0.84"><animate attributeName="rx" values="108;114;108" dur="4.5s" repeatCount="indefinite"/></ellipse><ellipse cx="190" cy="285" rx="130" ry="24" fill="${pal.ink}" opacity="0.10"/>`;}
  if(hasMoon){inner+=`<circle cx="310" cy="55" r="26" fill="${pal.bg}" stroke="${pal.ink}" stroke-width="1.5" opacity="0"><animate attributeName="opacity" values="0;0.92" dur="2s" fill="freeze"/></circle><circle cx="310" cy="55" r="34" fill="${pal.wa}" opacity="0.08"/>`;}
  if(hasBamboo){const bx=70+(rc*17%60);inner+=`<line x1="${bx}" y1="315" x2="${bx-4}" y2="70" stroke="${pal.ink}" stroke-width="${hasTremble?3:2}" stroke-linecap="round" opacity="0.90">${hasTremble?`<animateTransform attributeName="transform" type="translate" values="0,0;2,0;-1,0;1,0;0,0" dur="1s" repeatCount="indefinite"/>`:''}${!hasTremble?`<animate attributeName="opacity" values="0;0.9" dur="1.5s" fill="freeze"/>`:''}
</line><line x1="${bx+22}" y1="315" x2="${bx+18}" y2="110" stroke="${pal.ink}" stroke-width="1.5" stroke-linecap="round" opacity="0.65"/><line x1="${bx+8}" y1="180" x2="${bx+36}" y2="165" stroke="${pal.ink}" stroke-width="1" stroke-linecap="round" opacity="0.5"/>`;}
  if(hasMist){inner+=`<ellipse cx="150" cy="190" rx="170" ry="38" fill="${pal.wa}" opacity="0.20"><animate attributeName="cx" values="150;175;150" dur="7s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.20;0.28;0.20" dur="7s" repeatCount="indefinite"/></ellipse>`;}
  if(hasLeap&&hasPond){inner+=`<path d="M ${140} 280 Q ${180} ${140} ${240} 280" stroke="${pal.ink}" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0" stroke-dasharray="180" stroke-dashoffset="180"><animate attributeName="stroke-dashoffset" from="180" to="0" dur="1.8s" fill="freeze"/><animate attributeName="opacity" values="0;0.75;0.75" keyTimes="0;0.1;1" dur="1.8s" fill="freeze"/></path><circle cx="240" cy="277" r="2" fill="${pal.ink}" opacity="0"><animate attributeName="opacity" values="0;0.8" begin="1.6s" dur="0.3s" fill="freeze"/></circle><circle cx="248" cy="272" r="1.5" fill="${pal.ink}" opacity="0"><animate attributeName="opacity" values="0;0.6" begin="1.7s" dur="0.3s" fill="freeze"/></circle>`;}

  if(hasRise&&!hasBamboo){inner+=`<path d="M ${sx} 300 Q ${sx+50} ${180} ${sx+100} 80" stroke="${pal.ink}" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0" stroke-dasharray="240" stroke-dashoffset="240"><animate attributeName="stroke-dashoffset" from="240" to="0" dur="2s" fill="freeze"/><animate attributeName="opacity" values="0;0.75" begin="0s" dur="0.3s" fill="freeze"/></path>`;}
  if(hasGather){inner+=`<circle cx="190" cy="200" r="4" fill="${pal.ink}" opacity="0"><animate attributeName="r" values="4;45;38" keyTimes="0;0.6;1" dur="3s" fill="freeze"/><animate attributeName="opacity" values="0.9;0.10;0.07" dur="3s" fill="freeze"/></circle>`;}
  if(hasSweep){inner+=`<line x1="10" y1="${155+rc%30}" x2="370" y2="${145+rc%30}" stroke="${pal.ink}" stroke-width="1" stroke-linecap="round" opacity="0" stroke-dasharray="370" stroke-dashoffset="370"><animate attributeName="opacity" values="0;0.55" dur="0.5s" fill="freeze"/><animate attributeName="stroke-dashoffset" from="370" to="0" dur="1.4s" fill="freeze"/></line>`;}

  inner+=`<text x="372" y="314" text-anchor="end" font-family="serif" font-size="9" fill="${pal.ink}" opacity="0.3" font-style="italic">墨語</text>`;

}

let dt=null;
function onInput(){
  const ta=document.getElementById('ta');
  const text=ta.value;
  updateGutter(text);
  syncScroll();
  clearTimeout(dt);
  dt=setTimeout(()=>{
    const errs=checkErrors(text);
    document.getElementById('hl').innerHTML=highlight(text,errs);
    renderErrors(errs);
    updateCanvas(text);
  },200);
}
function syncScroll(){
  const ta=document.getElementById('ta');
  const hl=document.getElementById('hl');
  const ln=document.getElementById('lnums');
  const sh=document.getElementById('shints');
  hl.scrollTop=ta.scrollTop;
  hl.scrollLeft=ta.scrollLeft;
  ln.scrollTop=ta.scrollTop;
  sh.scrollTop=ta.scrollTop;
}

let tto=null;
function showTT(x,y,tp,nm,fx){
  const tt=document.getElementById('btt');
  const wr=document.querySelector('.bw');
  const wr2=wr.getBoundingClientRect();
  document.getElementById('tttp').textContent=tp;
  document.getElementById('ttnm').textContent=nm;
  document.getElementById('ttfx').innerHTML=fx;
  let lx=x-wr2.left+14;
  let ly=y-wr2.top+12;
  if(lx+220>wr2.width)lx=x-wr2.left-230;
  tt.style.left=Math.max(4,lx)+'px';
  tt.style.top=Math.max(4,ly)+'px';
  tt.classList.add('show');
}
function hideTT(){clearTimeout(tto);document.getElementById('btt').classList.remove('show');}

document.getElementById('ta').addEventListener('mousemove',e=>{
  clearTimeout(tto);
  const ta=document.getElementById('ta');
  const r=ta.getBoundingClientRect();
  const x=e.clientX-r.left+ta.scrollLeft-10;
  const y=e.clientY-r.top+ta.scrollTop-11;
  const li=Math.floor(y/22);
  const ci=Math.floor(x/7.7);
  const lines=ta.value.split('\n');
  if(li<0||li>=lines.length){hideTT();return;}
  const line=lines[li];
  let pos=0,found=null;
  for(const chunk of line.split(/(\s+)/)){
    if(!chunk.trim()){pos+=chunk.length;continue;}
    if(ci>=pos&&ci<pos+chunk.length){found=chunk.replace(/[.,!?—\[\]()\u2026\u2014…!]/g,'').toLowerCase();break;}
    pos+=chunk.length;
  }
  if(!found){hideTT();return;}
  let tp='',nm=found,fx='';
  if(VB[found]){tp='verb';fx=VB[found].fx+(VB[found].t!==undefined?`<br><span style="opacity:.65">tension ${VB[found].t>=0?'+':''}${VB[found].t}</span>`:'');}
  else if(NN[found]){tp=`noun · ${NN[found].c}`;fx=`region: ${NN[found].r}<br>shape: ${NN[found].s}`;}
  else if(KG[found]){tp=`kigo · ${KG[found].s}`;fx=`palette: ${KG[found].p}<br>${KG[found].d}`;}
  else if(MD[found]){tp='modifier';fx=MD[found].fx;}
  else{hideTT();return;}
  tto=setTimeout(()=>showTT(e.clientX,e.clientY,tp,nm,fx),180);
});
document.getElementById('ta').addEventListener('mouseleave',hideTT);
document.getElementById('ta').addEventListener('scroll',syncScroll);

function switchTab(n){
  document.querySelectorAll('.bt').forEach((b,i)=>b.classList.toggle('on',['editor','manual','tutorial'][i]===n));
  document.querySelectorAll('.bp').forEach(p=>p.classList.remove('on'));
  document.getElementById('panel-'+n).classList.add('on');
}
function runPoem(){
  const ta=document.getElementById('ta');
  if(!ta.value.trim())return;
  const btn=document.getElementById('runbtn');
  btn.textContent='● rendering';
  updateCanvas(ta.value);
  setTimeout(()=>{btn.textContent='▶ render';},1300);
}
function loadPoem(p){
  document.getElementById('ta').value=p;
  switchTab('editor');
  onInput();
}

the crow holds still, silent.
snow gathers below.

pale moon rises slow,
mist drifts across the valley...
the cold holds its breath.</div>

<div class="tc2"><div class="tn2">LESSON 三 · echo and dissolution</div>
<div class="tt2">Loops, recursion, and the bracket.</div>
<p class="tp">The echo bracket <strong style="font-family:var(--font-mono);font-weight:500">[ ]</strong> repeats the enclosed mark with decaying opacity. The <strong style="font-family:var(--font-mono);font-weight:500">?</strong> conditional branches on mood. And <strong style="font-family:var(--font-mono);font-weight:500">...</strong> dissolves the loop when alpha falls below threshold. Watch the error console — it will note if any bracket is left unclosed.</p>
<div class="tpo">seed: "stone in deep water"

[the stone sinks, slow.]
deep water holds itself.
silence gathers still.

the moon trembles?
pale mist rises, dissolves...
nothing remains.</div>
<p class="tp" style="margin-top:8px">Try removing one ] bracket and observe the error message that appears. Then add <strong style="font-family:var(--font-mono);font-weight:500">!</strong> after <em>trembles</em> and watch the emphasis multiplier activate.</p>

<div class="tc2"><div class="tn2">LESSON 四 · errors and their voices</div>
<div class="tt2">Understanding the residue console.</div>
<p class="tp">The console below the editor does not reject your poem. It observes it. This poem contains intentional tensions — a conflict between <em>scatters</em> and <em>holds</em>, an unknown word, and a line over the syllable threshold. Load it and read what the console says. Each message is written in the register of the manuscript.</p>
<div class="tpo">old stone scatters and holds,
the river flows beyond memory —
bamboo trembles, ancient, still, quiet, soft.</div>
<p class="tp" style="margin-top:8px">Notice: the <span style="text-decoration:underline wavy var(--color-border-danger);text-underline-offset:2px">red wavy underline</span> on conflicting tokens. The <span style="text-decoration:underline wavy var(--color-border-warning);text-underline-offset:2px">amber underline</span> on words the saijiki does not know. Both are invitations, not prohibitions.</p>
