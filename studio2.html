<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio — Jonathan Britton</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink:   #0d0c0a;
  --dark:  #1a1917;
  --stone: #2e2c28;
  --dim:   #5c5550;
  --mid:   #8a8078;
  --pale:  #c4bcb0;
  --cream: #ede9e2;
  --gold:  #b8955a;
  --red:   #e63946;
}
html, body { 
  height: 100%; 
  overflow: hidden; 
  background: var(--ink); 
  color: var(--pale); 
  font-family: 'Jost', "Microsoft YaHei", "SimSun", "Malgun Gothic", "Noto Sans", sans-serif; 
  font-weight: 300; 
}

/* ── LAYOUT ── */
#app { display: grid; grid-template-columns: 1fr 300px; height: 100vh; }
#canvas-wrap { position: relative; overflow: hidden; background: var(--ink); }
#canvas-wrap canvas { display: block; }
#panel { background: var(--dark); border-left: 1px solid var(--stone); display: flex; flex-direction: column; overflow: hidden; }

/* ── PANEL HEADER ── */
.panel-head {
  padding: 1.4rem 1.4rem 1rem;
  border-bottom: 1px solid var(--stone);
  flex-shrink: 0;
}
.panel-title {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 1.1rem;
  color: var(--cream);
  margin-bottom: 0.2rem;
}
.panel-sub {
  font-size: 0.58rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--dim);
}

/* ── SCROLLABLE CONTROLS ── */
#controls { flex: 1; overflow-y: auto; padding: 0 0 2rem; }
#controls::-webkit-scrollbar { width: 4px; }
#controls::-webkit-scrollbar-track { background: transparent; }
#controls::-webkit-scrollbar-thumb { background: var(--stone); }

/* ── SECTION ── */
.section { padding: 1rem 1.4rem 0.5rem; border-bottom: 1px solid var(--stone); }
.section-label {
  font-size: 0.55rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 0.9rem;
}

/* ── MODE BUTTONS ── */
.mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 0.5rem; }
.mode-btn {
  background: none;
  border: 1px solid var(--stone);
  color: var(--dim);
  font-family: 'Jost', sans-serif;
  font-size: 0.58rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 0.5rem 0.4rem;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.mode-btn:hover { border-color: var(--mid); color: var(--pale); }
.mode-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(184,149,90,0.06); }

/* ── CHARSET BUTTONS ── */
.charset-grid { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 0.5rem; }
.cs-btn {
  background: none;
  border: 1px solid var(--stone);
  color: var(--dim);
  font-family: 'Jost', sans-serif;
  font-size: 0.55rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.35rem 0.7rem;
  cursor: pointer;
  transition: all 0.2s;
}
.cs-btn:hover { border-color: var(--mid); color: var(--pale); }
.cs-btn.active { border-color: var(--pale); color: var(--pale); }

/* ── CUSTOM CHARS ── */
.custom-row { display: flex; gap: 6px; margin-top: 0.6rem; }
.custom-input {
  flex: 1;
  background: var(--ink);
  border: 1px solid var(--stone);
  color: var(--pale);
  font-family: 'EB Garamond', serif;
  font-size: 1rem;
  padding: 0.4rem 0.6rem;
  outline: none;
  min-width: 0;
  transition: border-color 0.2s;
}
.custom-input:focus { border-color: var(--pale); }
.custom-input::placeholder { color: var(--stone); font-style: italic; }
.custom-apply {
  background: none;
  border: 1px solid var(--stone);
  color: var(--dim);
  font-family: 'Jost', sans-serif;
  font-size: 0.55rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 0 0.8rem;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.custom-apply:hover { border-color: var(--pale); color: var(--pale); }

/* ── SLIDERS ── */
.ctrl-row { margin-bottom: 0.85rem; }
.ctrl-label-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 0.3rem;
}
.ctrl-name {
  font-size: 0.58rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--mid);
}
.ctrl-val {
  font-family: 'EB Garamond', serif;
  font-size: 0.85rem;
  color: var(--pale);
  min-width: 36px;
  text-align: right;
}
input[type=range] {
  -webkit-appearance: none;
  width: 100%;
  height: 2px;
  background: var(--stone);
  outline: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--gold);
  cursor: pointer;
  transition: transform 0.15s;
}

  
input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }

/* ── COLOR PALETTE ── */
.palette-grid { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 0.5rem; }
.pal-btn {
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.15s;
  flex-shrink: 0;
}
.pal-btn:hover { transform: scale(1.2); }
.pal-btn.active { border-color: var(--cream); }

/* ── ACCENT COLOR ── */
.accent-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 0.5rem; }
.accent-swatch {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: transform 0.15s;
}
.accent-swatch:hover { transform: scale(1.2); }
.accent-swatch.active { border-color: var(--cream); }

/* ── ACTION BUTTONS ── */
.action-row { display: flex; gap: 6px; padding: 1rem 1.4rem 0; }
.action-btn {
  flex: 1;
  background: none;
  border: 1px solid var(--stone);
  color: var(--dim);
  font-family: 'Jost', sans-serif;
  font-size: 0.58rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 0.65rem 0;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.action-btn:hover { border-color: var(--pale); color: var(--pale); }
.action-btn.play { border-color: var(--gold); color: var(--gold); }
.action-btn.play:hover { background: rgba(184,149,90,0.08); }

/* ── CANVAS OVERLAY ── */
.canvas-corner {
  position: absolute;
  bottom: 1.5rem; left: 1.8rem;
  font-family: 'Jost', sans-serif;
  font-size: 0.55rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: rgba(90,85,80,0.6);
  pointer-events: none;
}

/* ── MOBILE: stack vertically ── */
@media (max-width: 700px) {
  #app { grid-template-columns: 1fr; grid-template-rows: 55vw 1fr; }
  #canvas-wrap { height: 55vw; }
  #panel { border-left: none; border-top: 1px solid var(--stone); overflow-y: auto; }
  html, body { overflow: auto; }
}
</style>
</head>

<script>
// ── CHARACTER SETS ─────────────────────────────────────────────
const CHARSETS = {

  accent:    '#e63946',
  accentAmt: 0.10,
  bg:        '#0d0c0a',
  speed:     0.004,
  wave:      30,
  turb:      0.005,
  density:   0.45, // Lower = more dense in this logic
  spacing:   12,
  maxSize:   20,
  noiseScale:0.01,
  charRotation: 0,
  flipH: 1,
  playing:   false,
  fc:        0,
};

let rainDrops = [];
function initRain(W, H) {
  rainDrops = [];
  let cols = Math.floor(W / S.spacing);
  for (let i = 0; i < cols; i++) {
    rainDrops.push({ x: i * S.spacing + S.spacing/2, y: Math.random() * -H, speed: 1 + Math.random() * 3 });
  }
}

let tessGrid = [];
function initTess(W, H) {
  tessGrid = [];
  let cols = Math.floor(W / (S.spacing * 2));
  let rows = Math.floor(H / (S.spacing * 2));
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      tessGrid.push({ x: c * S.spacing * 2 + S.spacing, y: r * S.spacing * 2 + S.spacing, phase: Math.random() * Math.PI * 2 });
}

// ── p5 SKETCH ───────────────────────────────────────────────────
let sk = function(p) {

  p.setup = function() {
    let wrap = document.getElementById('canvas-wrap');
    p.createCanvas(wrap.offsetWidth, wrap.offsetHeight).parent('canvas-wrap');
    p.textAlign(p.CENTER, p.CENTER);
    p.noStroke();
    initRain(p.width, p.height);
    initTess(p.width, p.height);
    p.noLoop();
    p.redraw();
  };

  p.windowResized = function() {
    let wrap = document.getElementById('canvas-wrap');
    p.resizeCanvas(wrap.offsetWidth, wrap.offsetHeight);
    initRain(p.width, p.height);
    initTess(p.width, p.height);
    if (!S.playing) p.redraw();
  };

  p.draw = function() {
    if (S.playing) S.fc++;
    let t = S.fc * S.speed;
    p.background(S.bg);

    switch(S.mode) {
      case 'bloom':   drawBloom(p, t);   break;
      case 'wave':    drawWave(p, t);    break;
      case 'rain 1':    drawRain1(p, t);    break;
      case 'rain 2':    drawRain2(p, t);    break;  
      case 'vortex':  drawVortex(p, t);  break;
      case 'ripple':  drawRipple(p, t);  break;
      case 'drift':   drawDrift(p, t);   break;
      case 'tess':    drawTess(p, t);    break;
      case 'warp':    drawWarp(p, t);    break;
    }
  };
// ── BLOOM ─────────────────────────────────────────────────────
  function drawBloom(p, t) {
    let sp = S.spacing;
    for (let x = 0; x < p.width; x += sp) {
      for (let y = 0; y < p.height; y += sp) {
        let n = p.noise(x * S.noiseScale, y * S.noiseScale, t);
        if (n < S.density) continue;
        
        let angle = p.noise(x*S.noiseScale*0.5, y*S.noiseScale*0.5, t*0.5) * p.TWO_PI * 4;
        p.push();
        p.translate(x, y);
        p.rotate(angle + p.radians(S.charRotation));
        p.scale(S.flipH, 1);
        p.fill(pickColor(p, x, y, t));
        p.textSize(p.map(n, S.density, 1, 2, S.maxSize));
        p.text(pickChar(p, x, y, t), 0, 0);
        p.pop();
      }
    }
  }
// ── WAVE ─────────────────────────────────────────────────────
function drawWave(p, t) {
  let sp = S.spacing;
  for (let x = sp; x < p.width; x += sp) {
    for (let y = sp; y < p.height; y += sp) {
      let n = p.noise(x * S.noiseScale, y * S.noiseScale, t);
      if (n < S.density) continue;

      let wx = Math.sin(y * S.turb * 10 + t * 2) * S.wave;
      let wy = Math.cos(x * S.turb * 10 + t * 1.5) * S.wave * 0.6;
      
      p.push();
      p.translate(x + wx, y + wy); // Translate first
      p.rotate(p.radians(S.charRotation)); // Then rotate
      p.scale(S.flipH, 1); // Then flip
      p.fill(pickColor(p, x, y, t));
      p.textSize(p.map(n, S.density, 1, 6, S.maxSize));
      p.text(pickChar(p, x, y, t), 0, 0);
      p.pop();
    }
  }
}


  // ── RAIN 1 ─────────────────────────────────────────────────────
  function drawRain1(p, t) {
    if (S.playing) {
      rainDrops.forEach(function(d) {
        d.y += d.speed * (S.speed * 250 + 1);
        if (d.y > p.height + S.spacing * 2) {
          d.y = -S.spacing * (2 + Math.random() * 8);
          d.speed = 1 + Math.random() * 3;
        }
      });
    }

    rainDrops.forEach(function(d, i) {
      let trailLen = Math.floor(3 + (S.wave / 20));
      for (let j = 0; j < trailLen; j++) {
        let ty = d.y - j * S.spacing;
        if (ty < 0 || ty > p.height) continue;
        
        let alpha = p.map(j, 0, trailLen, 255, 30);
        
        // Fix: Ensure we have a valid color string from the palette or accent
        let rawCol = j === 0 ? pickColor(p, d.x, ty, t) : S.palette[i % S.palette.length];
        let colObj = p.color(rawCol); 

        // Fix: Use the color object to set the fill with alpha
        p.fill(p.red(colObj), p.green(colObj), p.blue(colObj), alpha);
        
        p.textSize(j === 0 ? S.maxSize * 0.8 : S.maxSize * 0.5);
        p.text(pickChar(p, i, j, t), d.x, ty); // Added 't' to match your pickChar signature
      }
    });
  }

  // Replace the color lines in drawRain1 with this:

  // ── RAIN 2 ───────────────────────────────────────────────────── 
  function drawRain2(p, t) {
    if (S.playing) {
      rainDrops.forEach(d => {
        d.y += d.speed * (S.speed * 500 + 2);
        if (d.y > p.height + 50) d.y = -20;
      });
    }
    rainDrops.forEach((d, i) => {
      p.fill(pickColor(p, d.x, d.y, t));
      p.textSize(S.maxSize);
      p.text(pickChar(p, i, d.y, t), d.x, d.y);
    });
  }
// ── VORTEX ─────────────────────────────────────────────────────
  function drawVortex(p, t) {
    let cx = p.width / 2, cy = p.height / 2;
    let maxR = Math.max(p.width, p.height) * 0.6;
    for (let r = S.spacing; r < maxR; r += S.spacing) {
      let count = Math.floor((p.TWO_PI * r) / S.spacing);
      for (let i = 0; i < count; i++) {
        let angle = (i / count) * p.TWO_PI + (t * (maxR / r) * 0.5);
        let x = cx + Math.cos(angle) * r;
        let y = cy + Math.sin(angle) * r;
        
        let n = p.noise(x * S.noiseScale, y * S.noiseScale, t);
        if (n < S.density) continue;

        p.push();
        p.translate(x, y);
        p.rotate(angle + p.radians(S.charRotation));
        p.scale(S.flipH, 1);
        p.fill(pickColor(p, x, y, t));
        p.textSize(p.map(n, S.density, 1, 4, S.maxSize));
        p.text(pickChar(p, i, r, t), 0, 0);
        p.pop();
      }
    }
  }
// ── RIPPLE ─────────────────────────────────────────────────────
function drawRipple(p, t) {
  let cx = p.width / 2, cy = p.height / 2;
  for (let x = 0; x < p.width; x += S.spacing) {
    for (let y = 0; y < p.height; y += S.spacing) {
      let d = p.dist(x, y, cx, cy);
      let ripple = Math.sin(d * S.turb * 10 - t * 5) * S.wave;
      let n = p.noise(x * S.noiseScale, y * S.noiseScale, t);
      if (n < S.density) continue;

      p.push();
      p.translate(x, y + ripple);
      p.rotate(p.radians(S.charRotation));
      p.scale(S.flipH, 1);
      p.fill(pickColor(p, x, y, t));
      p.textSize(S.maxSize);
      p.text(pickChar(p, x, y, t), 0, 0);
      p.pop();
    }
  }
}
// ── DRIFT ─────────────────────────────────────────────────────
function drawDrift(p, t) {
  for (let x = 0; x < p.width; x += S.spacing) {
    for (let y = 0; y < p.height; y += S.spacing) {
      let n = p.noise(x * S.noiseScale, y * S.noiseScale, t);
      if (n < S.density) continue;

      let offX = p.noise(x * 0.005, t) * S.wave * 2;
      let offY = p.noise(y * 0.005, t) * S.wave * 2;
      p.push();
      p.translate(x + offX, y + offY);
      p.rotate(p.radians(S.charRotation));
      p.scale(S.flipH, 1);
      p.fill(pickColor(p, x, y, t));
      p.textSize(S.maxSize);
      p.text(pickChar(p, x, y, t), 0, 0);
      p.pop();
    }
  }
}

// ── TESSELATION ─────────────────────────────────────────────────────
function drawTess(p, t) {
  tessGrid.forEach((cell, i) => {
    let n = p.noise(cell.x * S.noiseScale, cell.y * S.noiseScale, t);
    if (n < S.density) return;
    p.push();
    p.translate(cell.x, cell.y);
    p.rotate(p.radians(S.charRotation));
    p.scale(S.flipH, 1);
    p.fill(pickColor(p, cell.x, cell.y, t));
    p.textSize(S.maxSize);
    p.text(pickChar(p, i, t, t), 0, 0);
    p.pop();
  });
}

// ── WARP ─────────────────────────────────────────────────────
function drawWarp(p, t) {
  for (let x = 0; x < p.width; x += S.spacing) {
    for (let y = 0; y < p.height; y += S.spacing) {
      let n = p.noise(x * S.noiseScale, y * S.noiseScale, t);
      if (n < S.density) continue;
      let warp = p.noise(x * 0.002, y * 0.002, t) * S.wave * 4;
      p.push();
      p.translate(x + warp, y + warp);
      p.rotate(p.radians(S.charRotation));
      p.scale(S.flipH, 1);
      p.fill(pickColor(p, x, y, t));
      p.textSize(S.maxSize); // Added textSize which was missing
      p.text(pickChar(p, x, y, t), 0, 0);
      p.pop();
    }
  }
}

  

  function pickChar(p, x, y, t) {
    let i = Math.floor(p.noise(x * 0.1, y * 0.1, t * 0.2) * S.chars.length);
    return S.chars[i % S.chars.length];
  }

  function pickColor(p, x, y, t) {
    if (S.accent !== 'none') {
      let pn = p.noise(x * 0.02, y * 0.02, t + 50);
      if (pn > (1 - S.accentAmt)) return S.accent;
    }
    let cVal = p.noise(x * 0.01, y * 0.01, t);
    let ci = Math.floor(cVal * S.palette.length);
    return S.palette[ci % S.palette.length];
  }

  window._studio = {
    regen: () => { S.fc = 0; p.redraw(); },
    save:  () => p.saveCanvas('studio_' + S.mode, 'png'),
    play:  () => { S.playing = !S.playing; S.playing ? p.loop() : p.noLoop(); return S.playing; },
    redraw: () => { if (!S.playing) p.redraw(); },
    reinitRain: () => initRain(p.width, p.height),
    reinitTess: () => initTess(p.width, p.height)
  };
};

new p5(sk);

// ── UI WIRING ────────────────────────────────────────────────────
document.getElementById('modeGrid').addEventListener('click', e => {
  let btn = e.target.closest('.mode-btn');
  if (!btn) return;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  
  S.mode = btn.dataset.mode;
  document.getElementById('modeLabel').textContent = btn.textContent;
  
  // FIX: Check if the mode contains 'rain' (matches "rain 1" and "rain 2")
  if (S.mode.includes('rain')) window._studio.reinitRain();
  
  if (S.mode === 'tess') window._studio.reinitTess();
  window._studio.redraw();
});
  
document.getElementById('charsetGrid').addEventListener('click', e => {
  let btn = e.target.closest('.cs-btn');
  if (!btn) return;
  document.querySelectorAll('.cs-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  let cs = btn.dataset.cs;
  document.getElementById('customRow').style.display = cs === 'custom' ? 'flex' : 'none';
  if (cs !== 'custom') { S.chars = CHARSETS[cs]; window._studio.redraw(); }
});

document.getElementById('customApply').addEventListener('click', () => {
  let val = document.getElementById('customInput').value.trim();
  if (!val) return;
  S.chars = val.split('').filter(c => c.trim() !== '');
  window._studio.redraw();
});

function wireSlider(id, valId, key, transform) {
  let slider = document.getElementById(id);
  let label  = document.getElementById(valId);
  slider.addEventListener('input', function() {
    let v = +this.value;
    label.textContent = v;
    S[key] = transform(v);
    if (key === 'spacing') { window._studio.reinitRain(); window._studio.reinitTess(); }
    window._studio.redraw();
  });
}

wireSlider('sSpeed',   'vSpeed',   'speed',      v => v * 0.001);
wireSlider('sWave',    'vWave',    'wave',       v => v);
wireSlider('sTurb',    'vTurb',    'turb',       v => v * 0.001);
wireSlider('sDens',    'vDens',    'density',    v => 0.8 - (v * 0.07));
wireSlider('sSpacing', 'vSpacing', 'spacing',    v => v);
wireSlider('sMaxSize', 'vMaxSize', 'maxSize',    v => v);
wireSlider('sRot',  'vRot',  'charRotation', v => v);
wireSlider('sFlip', 'vFlip', 'flipH',        v => v);
wireSlider('sNoise',   'vNoise',   'noiseScale', v => v * 0.002);
wireSlider('sAccent',  'vAccent',  'accentAmt',  v => v / 100);

document.getElementById('palGrid').addEventListener('click', e => {
  let btn = e.target.closest('.pal-btn');
  if (!btn) return;
  document.querySelectorAll('.pal-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  S.palette = PALETTES[btn.dataset.pal];
  window._studio.redraw();
});

document.getElementById('accentRow').addEventListener('click', e => {
  let sw = e.target.closest('.accent-swatch');
  if (!sw) return;
  document.querySelectorAll('#accentRow .accent-swatch').forEach(b => b.classList.remove('active'));
  sw.classList.add('active');
  S.accent = sw.dataset.accent;
  window._studio.redraw();
});

document.getElementById('bgRow').addEventListener('click', e => {
  let sw = e.target.closest('.accent-swatch');
  if (!sw) return;
  document.querySelectorAll('#bgRow .accent-swatch').forEach(b => b.classList.remove('active'));
  sw.classList.add('active');
  S.bg = sw.dataset.bg;
  window._studio.redraw();
});

document.getElementById('btnPlay').addEventListener('click', function() {
  this.textContent = window._studio.play() ? '⏸ Pause' : '▶ Play';
});
document.getElementById('btnRegen').addEventListener('click', () => window._studio.regen());
document.getElementById('btnSave').addEventListener('click', () => window._studio.save());
</script>
