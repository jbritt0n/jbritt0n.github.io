<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Generative Studio Expanded</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
body { margin:0; background:#0d0c0a; color:#eee; font-family:sans-serif; display:flex;}
#controls { width:300px; padding:12px; background:#111; overflow:auto;}
canvas { display:block;}
input, select, button { width:100%; margin-bottom:6px;}
</style>
</head>
<body>

<div id="controls">

<h3>Motion</h3>
Speed <input type="range" id="speed" min="0" max="20" value="4">
Entropy <input type="range" id="entropy" min="0" max="100" value="0">
Case glitch <input type="range" id="case" min="0" max="100" value="0">
Flip <input type="range" id="flip" min="0" max="100" value="0">

<h3>Color</h3>
Accent <input type="color" id="accent" value="#e63946">
Accent 2 <input type="color" id="accent2" value="#80b8e8">

<h3>Font</h3>
<select id="font">
<option>monospace</option>
<option>serif</option>
<option>sans-serif</option>
<option>Courier New</option>
<option>Times New Roman</option>
<option>Arial</option>
</select>

<h3>Charset</h3>
<select id="charset">
<option value="ascii">ASCII</option>
<option value="blocks">Blocks</option>
<option value="cyrillic">Cyrillic</option>
<option value="sanskrit">Sanskrit</option>
<option value="georgian">Georgian</option>
</select>

<h3>Composition</h3>
<select id="comp">
<option value="none">None</option>
<option value="bands">Bands</option>
<option value="blocks">Blocks</option>
</select>

<h3>Image → Text</h3>
<input type="text" id="imgurl" placeholder="Image URL">
<button onclick="loadImg()">Load Image</button>

<h3>Canvas</h3>
W <input type="number" id="cw" value="800">
H <input type="number" id="ch" value="1000">
<button onclick="resizeC()">Resize</button>

<button onclick="togglePlay()">Play / Pause</button>

</div>

<script>

let S = {
  speed:0.004,
  entropy:0,
  case:0,
  flip:0,
  accent:'#e63946',
  accent2:'#80b8e8',
  font:'monospace',
  comp:'none',
  chars:[],
  playing:true,
  t:0
};

const CHARSETS = {
  ascii:['@','#','$','%','&','?','!'],
  blocks:['░','▒','▓','█'],
  cyrillic:['Д','Ж','Л','Ф','Ц','Ч'],
  sanskrit:['अ','आ','इ','उ','क','ग'],
  georgian:['ა','ბ','გ','დ','ე']
};

let img;

function loadImg(){
  let url = document.getElementById('imgurl').value;
  img = loadImage(url);
}

function resizeC(){
  resizeCanvas(
    +document.getElementById('cw').value,
    +document.getElementById('ch').value
  );
}

function togglePlay(){ S.playing=!S.playing; }

function distort(ch){
  if (random()<S.entropy/100){
    let g=['_',' ','█','░'];
    ch=g[floor(random(g.length))];
  }
  if (random()<S.case/100){
    ch = ch===ch.toUpperCase()?ch.toLowerCase():ch.toUpperCase();
  }
  return ch;
}

function pickChar(){
  let ch = random(S.chars);
  return distort(ch);
}

function pickColor(x,y){
  let r = random();
  if (r<0.1) return S.accent;
  if (r<0.2) return S.accent2;
  return color(200);
}

function setup(){
  createCanvas(800,1000);
  textAlign(CENTER,CENTER);
}

function draw(){

  if(S.playing) S.t+=S.speed;

  background(10);

  S.speed = document.getElementById('speed').value * 0.001;
  S.entropy = document.getElementById('entropy').value;
  S.case = document.getElementById('case').value;
  S.flip = document.getElementById('flip').value;
  S.accent = document.getElementById('accent').value;
  S.accent2 = document.getElementById('accent2').value;
  S.font = document.getElementById('font').value;
  S.comp = document.getElementById('comp').value;

  S.chars = CHARSETS[document.getElementById('charset').value];

  textFont(S.font);

  if(img){
    drawImageText();
    return;
  }

  let sp=14;

  for(let x=0;x<width;x+=sp){
    for(let y=0;y<height;y+=sp){

      if(random()>0.5) continue;

      push();

      translate(x,y);

      if(random()<S.flip/100){
        scale(random()<0.5?-1:1,1);
      }

      fill(pickColor(x,y));

      if(S.comp==='bands'){
        if(y<height*0.3) fill(S.accent);
        else if(y<height*0.6) fill(S.accent2);
      }

      if(S.comp==='blocks'){
        if((floor(x/80)+floor(y/80))%2==0){
          fill(S.accent);
        }
      }

      textSize(random(6,20));
      text(pickChar(),0,0);

      pop();
    }
  }

  glitchField();
}

function glitchField(){
  if(random()<0.2){
    stroke(255,0,0,80);
    let y=random(height);
    line(0,y,width,y);
  }
}

function drawImageText(){

  img.loadPixels();

  let sp=10;

  for(let x=0;x<img.width;x+=sp){
    for(let y=0;y<img.height;y+=sp){

      let i=(x+y*img.width)*4;
      let bright=img.pixels[i];

      let idx = floor(map(bright,0,255,0,S.chars.length));
      let ch=S.chars[idx];

      fill(bright);
      textSize(10);
      text(ch,x,y);
    }
  }
}

</script>
</body>
</html>
