<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio — Jonathan Britton</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
/* Keeping your original styling exactly as it was, adding small tweaks for new sliders */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink:   #0d0c0a; --dark:  #1a1917; --stone: #2e2c28; --dim:   #5c5550;
  --mid:   #8a8078; --pale:  #c4bcb0; --cream: #ede9e2; --gold:  #b8955a;
}
html, body { height: 100%; overflow: hidden; background: var(--ink); color: var(--pale); font-family: 'Jost', sans-serif; font-weight: 300; }
#app { display: grid; grid-template-columns: 1fr 300px; height: 100vh; }
#canvas-wrap { position: relative; overflow: hidden; background: var(--ink); }
#canvas-wrap canvas { display: block; }
#panel { background: var(--dark); border-left: 1px solid var(--stone); display: flex; flex-direction: column; overflow: hidden; }
.panel-head { padding: 1.4rem 1.4rem 1rem; border-bottom: 1px solid var(--stone); }
.panel-title { font-family: 'EB Garamond', serif; font-style: italic; font-size: 1.1rem; color: var(--cream); }
#controls { flex: 1; overflow-y: auto; padding: 0 0 2rem; }
.section { padding: 1rem 1.4rem 0.5rem; border-bottom: 1px solid var(--stone); }
.section-label { font-size: 0.55rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--dim); margin-bottom: 0.9rem; }
.mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.mode-btn, .cs-btn, .action-btn { background: none; border: 1px solid var(--stone); color: var(--dim); font-size: 0.58rem; text-transform: uppercase; padding: 0.5rem; cursor: pointer; transition: all 0.2s; text-align: center; }
.mode-btn.active, .cs-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(184,149,90,0.06); }
.ctrl-row { margin-bottom: 0.85rem; }
.ctrl-label-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.3rem; font-size: 0.58rem; color: var(--mid); }
input[type=range] { width: 100%; height: 2px; background: var(--stone); -webkit-appearance: none; outline: none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: var(--gold); border-radius: 50%; cursor: pointer; }
.image-row { display: flex; gap: 6px; margin-top: 10px; }
.image-input { flex: 1; background: var(--ink); border: 1px solid var(--stone); color: var(--pale); padding: 5px; font-size: 0.7rem; }
</style>
</head>
<body>
<div id="app">
  <div id="canvas-wrap"><canvas id="gc"></canvas></div>
  <div id="panel">
    <div class="panel-head"><div class="panel-title">Generative Studio</div></div>
    <div id="controls">
      
      <div class="section">
        <div class="section-label">Animation mode</div>
        <div class="mode-grid" id="modeGrid">
          <button class="mode-btn active" data-mode="bloom">Bloom</button>
          <button class="mode-btn" data-mode="kinetic">Kinetic (Webster)</button>
          <button class="mode-btn" data-mode="wave">Wave field</button>
          <button class="mode-btn" data-mode="rain">Rain</button>
          <button class="mode-btn" data-mode="vortex">Vortex</button>
          <button class="mode-btn" data-mode="ripple">Ripple</button>
          <button class="mode-btn" data-mode="drift">Drift</button>
          <button class="mode-btn" data-mode="warp">Warp</button>
        </div>
      </div>

      <div class="section">
        <div class="section-label">Entropy & Glitch</div>
        <div class="ctrl-row">
            <div class="ctrl-label-row"><span>Erosion</span><span id="vErode">0</span></div>
            <input type="range" id="sErode" min="0" max="100" value="0">
        </div>
        <div class="ctrl-row">
            <div class="ctrl-label-row"><span>Case Glitch</span><span id="vCase">0</span></div>
            <input type="range" id="sCase" min="0" max="100" value="0">
        </div>
        <div class="ctrl-row">
            <div class="ctrl-label-row"><span>Mirror %</span><span id="vMirror">0</span></div>
            <input type="range" id="sMirror" min="0" max="100" value="0">
        </div>
      </div>

        <div class="section-label">Characters</div>
